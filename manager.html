<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>busyANT Time Clock — Manager</title>
<style>
  :root{
    --orange:#F47B20; --black:#1a1a1a; --green:#2e7d32;
    --ink:#1a1a1a; --muted:#6b6b6b; --line:#e6e6e6; --bg:#faf7f3; --card:#ffffff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;touch-action:manipulation;-webkit-text-size-adjust:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); min-height:100vh}
  .wrap{max-width:760px; margin:0 auto; padding:18px}

  .brand{text-align:center; margin:8px 0 18px}
  .brand h1{margin:0; font-size:26px; font-weight:800; letter-spacing:-.5px}
  .brand h1 .ant{color:var(--orange)}
  .brand p{margin:3px 0 0; color:var(--muted); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px}

  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:20px; box-shadow:0 6px 24px rgba(0,0,0,.05); margin-bottom:16px}

  /* login */
  .login{max-width:340px; margin:40px auto 0}
  .pin-display{display:flex; justify-content:center; gap:14px; margin:6px 0 22px}
  .pin-dot{width:15px; height:15px; border-radius:50%; border:2px solid var(--line)}
  .pin-dot.filled{background:var(--orange); border-color:var(--orange)}
  .keys{display:grid; grid-template-columns:repeat(3,1fr); gap:10px}
  .key{height:60px; border:none; border-radius:14px; background:#f3efe9; color:var(--ink); font-size:24px; font-weight:700; cursor:pointer; -webkit-appearance:none; appearance:none}
  .key:active{background:#eae4db; transform:scale(.96)}
  .key.ghost{background:transparent}
  .key.action{background:var(--black); color:#fff; font-size:17px}

  /* tabs */
  .tabs{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap}
  .tab{flex:1; min-width:90px; padding:11px 8px; border:1px solid var(--line); background:var(--card); border-radius:12px; font-weight:700; font-size:14px; cursor:pointer; color:var(--muted); transition:.12s}
  .tab.active{background:var(--black); color:#fff; border-color:var(--black)}

  h2{font-size:16px; margin:0 0 14px; font-weight:800}
  .muted{color:var(--muted)}
  .row-empty{text-align:center; color:var(--muted); padding:26px 10px; font-size:14px}

  /* live list */
  .live-item{display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--line)}
  .live-item:last-child{border-bottom:none}
  .live-name{font-weight:700; font-size:16px}
  .live-thumb{width:48px; height:48px; border-radius:10px; object-fit:cover; background:#eee; cursor:pointer; flex-shrink:0}
  .live-noimg{display:flex; align-items:center; justify-content:center; color:#bbb; font-weight:700}
  .live-since{font-size:13px; color:var(--muted); margin-top:2px}
  .badge{padding:5px 12px; border-radius:999px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.4px}
  .badge-working{background:#e7f3e8; color:var(--green)}
  .badge-break{background:#fff3e0; color:var(--orange)}

  /* controls */
  .field{margin-bottom:12px}
  .field label{display:block; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px}
  input[type=text],input[type=number],input[type=date],input[type=time],input[type=password],input[type=tel]{
    width:100%; padding:14px; border:1px solid var(--line); border-radius:12px; font-size:16px; font-family:inherit; background:#fff;
    -webkit-appearance:none; appearance:none; color:var(--ink); text-align:left; min-height:50px; line-height:1.2;
    display:block; box-sizing:border-box;
  }
  /* iOS renders date/time content centered & shrunk by default — force left & fill */
  input[type=date]::-webkit-date-and-time-value,
  input[type=time]::-webkit-date-and-time-value{ text-align:left; margin:0; }
  input[type=date]::-webkit-calendar-picker-indicator,
  input[type=time]::-webkit-calendar-picker-indicator{ margin-left:auto; }
  .btn{border:none; border-radius:12px; padding:13px 18px; font-size:15px; font-weight:800; cursor:pointer}
  .btn-primary{background:var(--orange); color:#fff}
  .btn-dark{background:var(--black); color:#fff}
  .btn-sm{padding:8px 12px; font-size:13px; border-radius:10px}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap}
  .date-row{display:flex; gap:10px}
  .date-row .field{flex:1; min-width:0}
  @media (max-width:480px){
    .date-row{flex-direction:column; gap:0}
  }

  /* timesheet table */
  .ts-table{width:100%; border-collapse:collapse; font-size:13px}
  .ts-table th{text-align:left; padding:8px 6px; border-bottom:2px solid var(--line); font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted)}
  .ts-table td{padding:9px 6px; border-bottom:1px solid #f0f0f0; vertical-align:middle}
  .ts-table tr:last-child td{border-bottom:none}
  .flagcell{color:var(--orange); font-weight:700; font-size:11px}
  .thumb{width:34px; height:34px; border-radius:8px; object-fit:cover; cursor:pointer; background:#eee}
  .totals{margin-top:14px; padding-top:14px; border-top:2px solid var(--line); display:flex; justify-content:space-between; font-weight:800; font-size:15px}
  .name-sub{font-weight:700}

  /* employees */
  .emp-item{display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--line)}
  .emp-item:last-child{border-bottom:none}
  .emp-name{font-weight:700}
  .emp-meta{font-size:12px; color:var(--muted); margin-top:2px}
  .tag{display:inline-block; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; padding:2px 7px; border-radius:6px; margin-left:5px}
  .tag-admin{background:#fff3e0; color:var(--orange)}
  .tag-off{background:#f0f0f0; color:var(--muted)}

  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; padding:18px; z-index:50}
  .overlay.show{display:flex}
  .modal{background:#fff; border-radius:18px; padding:22px; width:100%; max-width:420px; max-height:90vh; overflow:auto}
  .modal h3{margin:0 0 16px; font-size:18px; font-weight:800}
  .modal-photo{display:block; width:200px; height:200px; border-radius:14px; object-fit:cover; margin:0 auto}
  .switch-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0}
  .switch-row label{font-weight:700; font-size:14px}

  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(120px); background:var(--black); color:#fff; padding:14px 22px; border-radius:13px; font-weight:700; box-shadow:0 10px 30px rgba(0,0,0,.25); transition:transform .3s; z-index:60; text-align:center; max-width:90vw}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.err{background:#c62828}
  .toast.ok{background:var(--green)}
  .spinner{display:inline-block; width:16px; height:16px; border:3px solid rgba(0,0,0,.15); border-top-color:var(--orange); border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .center{text-align:center; padding:30px}
  .hidden{display:none}

  /* logo header + watermark */
  .watermark{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    width:min(80vw,520px); opacity:.04; pointer-events:none; z-index:0 }
  .wrap{ position:relative; z-index:1 }
  .brand-logo{ height:48px; width:auto }

  /* loading overlay */
  #loadingOverlay{ position:fixed; inset:0; z-index:200; background:rgba(250,247,243,.96);
    display:none; flex-direction:column; align-items:center; justify-content:center }
  #loadingOverlay.show{ display:flex }
  #loadingOverlay img{ width:min(55vw,240px); animation:floatm 3.5s ease-in-out infinite }
  @keyframes floatm{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-14px) } }
  .load-spin{ width:34px; height:34px; border:4px solid rgba(0,0,0,.12); border-top-color:var(--orange);
    border-radius:50%; animation:spin .7s linear infinite; margin-top:26px }
  .load-text{ margin-top:14px; font-weight:700; color:var(--muted) }

  /* timesheet CARD layout (phone) */
  .shift-card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px;
    margin-bottom:10px; display:flex; gap:12px; align-items:flex-start }
  .shift-card .sc-photo{ width:52px; height:52px; border-radius:10px; object-fit:cover; background:#eee; flex-shrink:0; cursor:pointer }
  .shift-card .sc-noimg{ width:52px; height:52px; border-radius:10px; background:#f0f0f0; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; color:#bbb; font-weight:700 }
  .sc-body{ flex:1; min-width:0 }
  .sc-date{ font-weight:800; font-size:14px; margin-bottom:8px }
  .sc-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px 12px; font-size:13px }
  .sc-grid .lbl{ color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.3px; display:block }
  .sc-grid .val{ font-weight:700 }
  .sc-flag{ color:var(--orange); font-weight:700; font-size:12px; margin-top:6px }
  .sc-foot{ display:flex; justify-content:flex-end; margin-top:10px }

  /* today summary card */
  .today-card{ background:linear-gradient(135deg,#fff7f0,#fdfaf6); border:1px solid var(--line);
    border-radius:14px; padding:16px; margin-bottom:16px; display:none }
  .today-card.show{ display:block }
  .today-card h3{ margin:0 0 10px; font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted) }
  .today-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:8px }
  .today-daterow{ display:flex; flex-direction:column; align-items:center; gap:4px; flex:1 }
  .today-daterow input[type=date]{ width:auto; min-height:34px; padding:6px 10px; font-size:13px; border-radius:10px; text-align:center }
  .day-arrow{ width:40px; height:40px; flex-shrink:0; border:1px solid var(--line); background:#fff; border-radius:12px;
    font-size:22px; font-weight:800; color:var(--ink); cursor:pointer; line-height:1; -webkit-appearance:none; appearance:none }
  .day-arrow:active{ background:#f0ece6 }
  .day-arrow:disabled{ opacity:.3; cursor:default }
  .today-stats{ display:flex; gap:18px; flex-wrap:wrap }
  .today-stat .num{ font-size:24px; font-weight:800 }
  .today-stat .num.orange{ color:var(--orange) }
  .today-stat .lbl{ font-size:12px; color:var(--muted); font-weight:600 }

  /* overtime highlighting */
  .ot-week{ background:#fff3e0; border-color:#ffcc80 }
  .ot-badge{ display:inline-block; background:var(--orange); color:#fff; font-size:11px; font-weight:800;
    padding:2px 8px; border-radius:999px; letter-spacing:.3px; margin-left:6px; vertical-align:1px }
  .ot-line{ font-size:13px; color:var(--orange); font-weight:700; margin-top:2px }

  /* history view */
  .log-card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:8px }
  .log-top{ display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:4px }
  .log-change{ font-weight:700; font-size:14px }
  .log-note{ font-size:13px; color:var(--muted); font-style:italic; margin-top:4px }
</style>
</head>
<body>
<img class="watermark" src="logo.png" alt="">
<div class="wrap">
  <div class="brand">
    <img class="brand-logo" src="logo.png" alt="busyANT">
    <p>Manager</p>
  </div>

  <!-- LOGIN -->
  <div id="loginView" class="card login">
    <p class="muted" style="text-align:center;margin-top:0">Enter your admin PIN</p>
    <div class="pin-display" id="pinDisplay">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="keys">
      <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
      <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
      <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
      <button class="key ghost"></button><button class="key" data-k="0">0</button><button class="key action" data-k="del">⌫</button>
    </div>
  </div>

  <!-- APP -->
  <div id="appView" class="hidden">
    <div class="tabs">
      <button class="tab active" data-tab="live">On Shift</button>
      <button class="tab" data-tab="sheets">Timesheets</button>
      <button class="tab" data-tab="staff">Staff</button>
    </div>

    <!-- LIVE -->
    <div id="liveTab" class="card">
      <div id="todaySummary" class="today-card"></div>
      <h2>Working right now</h2>
      <div id="liveList"><div class="center"><span class="spinner"></span></div></div>
      <div class="btn-row" style="margin-top:14px">
        <button class="btn btn-dark btn-sm" id="liveRefresh">Refresh</button>
      </div>
    </div>

    <!-- TIMESHEETS -->
    <div id="sheetsTab" class="card hidden">
      <h2>Timesheets</h2>
      <div class="date-row">
        <div class="field"><label>From</label><input type="date" id="startDate"></div>
        <div class="field"><label>To</label><input type="date" id="endDate"></div>
      </div>
      <div class="field"><label>Employee</label>
        <select id="empFilter" style="width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;font-size:16px;background:#fff;min-height:50px">
          <option value="">All employees</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="loadSheets">View</button>
        <button class="btn btn-dark" id="exportCsv">Export CSV</button>
        <button class="btn btn-dark" id="addEntryBtn">+ Add Entry</button>
        <button class="btn btn-dark" id="historyBtn">History</button>
      </div>
      <div id="sheetsResult" style="margin-top:16px"></div>
    </div>

    <!-- STAFF -->
    <div id="staffTab" class="card hidden">
      <h2>Staff</h2>
      <div id="staffList"><div class="center"><span class="spinner"></span></div></div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn btn-primary" id="addStaffBtn">+ Add Employee</button>
      </div>
    </div>

    <p class="center muted" style="font-size:12px">
      Records older than 60 days auto-delete. Export before each pay period to keep a copy.
    </p>
  </div>
</div>

<!-- modals -->
<div class="overlay" id="overlay">
  <div class="modal" id="modalBox"></div>
</div>

<div class="toast" id="toast"></div>

<div id="loadingOverlay">
  <img src="logo.png" alt="">
  <div class="load-spin"></div>
  <div class="load-text" id="loadText">Loading…</div>
</div>

<script>
/* ---- block pinch + double-tap zoom (iOS Safari) ---- */
document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
document.addEventListener('gesturechange', function(e){ e.preventDefault(); });
document.addEventListener('gestureend', function(e){ e.preventDefault(); });
let lastTouchM = 0;
document.addEventListener('touchend', function(e){
  const now = Date.now();
  if (now - lastTouchM <= 300) { e.preventDefault(); }
  lastTouchM = now;
}, { passive: false });
document.addEventListener('touchmove', function(e){
  if (e.touches.length > 1) { e.preventDefault(); }
}, { passive: false });

const API = "https://busyant-proxy.pateltirth1211.workers.dev";

let adminPin = "";
let pinEntry = "";
let lastRows = [];
let rateCache = {};

/* ---- API (text/plain POST with JSON body — CORS-safe, handles photos) ---- */
async function api(payload){
  const res = await fetch(API, { method:"POST", body: JSON.stringify(payload) });
  const text = await res.text();
  let data = JSON.parse(text);
  if (typeof data === "string") data = JSON.parse(data);  // unwrap if double-encoded
  return data;
}

/* ---- login ---- */
function renderPin(){
  document.querySelectorAll("#pinDisplay .pin-dot").forEach((d,i)=> d.classList.toggle("filled", i < pinEntry.length));
}
document.querySelectorAll("#loginView .key[data-k]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const k = btn.dataset.k;
    if(k==="del") pinEntry = pinEntry.slice(0,-1);
    else if(pinEntry.length<4) pinEntry += k;
    renderPin();
    if(pinEntry.length===4) tryLogin();
  });
});
async function tryLogin(){
  showLoading("Checking…");
  try{
    const r = await api({action:"getLiveStatus", pin:pinEntry});
    hideLoading();
    if(!r.ok){ toast("Not an admin PIN","err"); pinEntry=""; renderPin(); return; }
    adminPin = pinEntry;
    document.getElementById("loginView").classList.add("hidden");
    document.getElementById("appView").classList.remove("hidden");
    renderLive(r.onShift);
    loadTodaySummary();
    populateEmpFilter();
    setDefaultDates();
  }catch(e){ hideLoading(); toast("Connection error","err"); pinEntry=""; renderPin(); }
}

/* ---- tabs ---- */
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    const tab = t.dataset.tab;
    document.getElementById("liveTab").classList.toggle("hidden", tab!=="live");
    document.getElementById("sheetsTab").classList.toggle("hidden", tab!=="sheets");
    document.getElementById("staffTab").classList.toggle("hidden", tab!=="staff");
    if(tab==="live") loadLive();
    if(tab==="staff") loadStaff();
  });
});

/* ---- live ---- */
async function loadLive(){
  document.getElementById("liveList").innerHTML = '<div class="center"><span class="spinner"></span></div>';
  const r = await api({action:"getLiveStatus", pin:adminPin});
  if(r.ok) renderLive(r.onShift);
  loadTodaySummary();
}

let summaryDate = null; // yyyy-mm-dd; null = today
async function loadTodaySummary(){
  try{
    const dateParam = summaryDate || iso(new Date());
    const r = await api({action:"getTodaySummary", pin:adminPin, date:dateParam});
    if(!r.ok) return;
    const box = document.getElementById("todaySummary");
    const isToday = dateParam === iso(new Date());
    const label = isToday ? "Today" : prettyDate(dateParam);
    const atToday = isToday; // disable the "next" arrow at today (no future days)
    const thirdStat = isToday
      ? `<div class="today-stat"><div class="num">${r.onShift}</div><div class="lbl">on shift now</div></div>`
      : `<div class="today-stat"><div class="num">${r.people}</div><div class="lbl">worked</div></div>`;
    box.innerHTML = `
      <div class="today-head">
        <button class="day-arrow" id="dayPrev">‹</button>
        <div class="today-daterow">
          <h3 style="margin:0">${label}</h3>
          <input type="date" id="dayPicker" value="${dateParam}" max="${iso(new Date())}">
        </div>
        <button class="day-arrow" id="dayNext" ${atToday?'disabled':''}>›</button>
      </div>
      <div class="today-stats">
        <div class="today-stat"><div class="num">${r.hours.toFixed(2)}</div><div class="lbl">hours done</div></div>
        <div class="today-stat"><div class="num orange">$${r.pay.toFixed(2)}</div><div class="lbl">labor cost</div></div>
        ${thirdStat}
      </div>`;
    box.classList.add("show");
    document.getElementById("dayPrev").addEventListener("click", ()=>{ shiftDay(-1); });
    document.getElementById("dayNext").addEventListener("click", ()=>{ shiftDay(1); });
    document.getElementById("dayPicker").addEventListener("change", e=>{
      summaryDate = e.target.value; loadTodaySummary();
    });
  }catch(e){}
}
function shiftDay(delta){
  const cur = summaryDate || iso(new Date());
  const parts = cur.split("-");
  const d = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2]));
  d.setDate(d.getDate()+delta);
  const todayIso = iso(new Date());
  const next = iso(d);
  if(next > todayIso) return; // never go past today
  summaryDate = next === todayIso ? null : next;
  loadTodaySummary();
}
function prettyDate(isoStr){
  const parts = isoStr.split("-");
  const d = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2]));
  const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const mons=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${days[d.getDay()]}, ${mons[d.getMonth()]} ${d.getDate()}`;
}

let empNames = [];
async function populateEmpFilter(){
  try{
    const r = await api({action:"getEmployees", pin:adminPin});
    if(!r.ok) return;
    empNames = r.employees.map(e=>e.name);
    r.employees.forEach(e=>{ rateCache[e.name] = e.rate; });
    const sel = document.getElementById("empFilter");
    sel.innerHTML = '<option value="">All employees</option>' +
      empNames.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join("");
  }catch(e){}
}
function renderLive(list){
  const box = document.getElementById("liveList");
  if(!list || !list.length){ box.innerHTML = '<div class="row-empty">Nobody is clocked in right now.</div>'; return; }
  box.innerHTML = "";
  list.forEach(p=>{
    const onBreak = p.state==="ON_BREAK";
    const div = document.createElement("div");
    div.className = "live-item";
    const pic = p.photo ? `<img class="live-thumb" src="${p.photo}" data-full="${p.photo}">` : `<div class="live-thumb live-noimg">—</div>`;
    div.innerHTML = `<div style="display:flex;align-items:center;gap:12px">
      ${pic}
      <div><div class="live-name">${esc(p.name)}</div>
      <div class="live-since">Since ${esc(p.since)}</div></div></div>
      <span class="badge ${onBreak?'badge-break':'badge-working'}">${onBreak?'On break':'Working'}</span>`;
    box.appendChild(div);
  });
  box.querySelectorAll(".live-thumb[data-full]").forEach(img=> img.addEventListener("click", ()=> showPhoto(img.dataset.full)));
}
document.getElementById("liveRefresh").addEventListener("click", loadLive);

/* ---- timesheets ---- */
function setDefaultDates(){
  const end = new Date();
  const start = new Date(); start.setDate(start.getDate()-13);
  document.getElementById("startDate").value = iso(start);
  document.getElementById("endDate").value = iso(end);
}
function iso(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function pad(n){ return n<10?"0"+n:n; }

document.getElementById("loadSheets").addEventListener("click", loadSheets);
document.getElementById("empFilter").addEventListener("change", ()=>{ if(lastRows.length) renderSheets(lastRows); });
async function loadSheets(){
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;
  const box = document.getElementById("sheetsResult");
  box.innerHTML = '<div class="center"><span class="spinner"></span></div>';
  const r = await api({action:"getTimesheets", pin:adminPin, start, end});
  if(!r.ok){ box.innerHTML = '<div class="row-empty">'+esc(r.error||"Error")+'</div>'; return; }
  lastRows = r.rows;
  renderSheets(r.rows);
}
function renderSheets(allRows){
  const box = document.getElementById("sheetsResult");
  const filter = document.getElementById("empFilter").value;
  const rows = filter ? allRows.filter(r=>r.name===filter) : allRows;
  if(!rows.length){ box.innerHTML = '<div class="row-empty">No shifts in this range.</div>'; return; }

  // group by employee
  const byName = {};
  rows.forEach(r=>{ (byName[r.name]=byName[r.name]||[]).push(r); });

  let html = "";
  let grand = 0, grandPay = 0, grandOtHrs = 0, grandOtPrem = 0;
  Object.keys(byName).sort().forEach(name=>{
    const list = byName[name];
    const rate = rateForNameLocal(name);

    // weekly hours for OT detection
    const weekHrs = {};
    list.forEach(r=>{
      const h = (r.hours===""||r.hours==null)?0:Number(r.hours);
      weekHrs[r.week] = (weekHrs[r.week]||0) + h;
    });
    // OT hours per week = hours over 40
    const weekOt = {};
    Object.keys(weekHrs).forEach(w=>{ weekOt[w] = Math.max(0, weekHrs[w]-40); });

    let sub = 0, subPay = 0, subOtHrs = 0, subOtPrem = 0;
    html += `<div class="name-sub" style="margin:16px 0 8px;font-size:16px">${esc(name)}</div>`;
    list.forEach(r=>{
      const hrs = (r.hours===""||r.hours==null)?0:Number(r.hours);
      const pay = (r.pay===""||r.pay==null)?0:Number(r.pay);
      sub += hrs; subPay += pay;
      const otWeek = weekOt[r.week] > 0;
      const bo = cleanTime(r.breakOut), bi = cleanTime(r.breakIn);
      const brk = (bo||bi) ? `${bo||"?"}–${bi||"?"}` : "—";
      const pic = r.photo ? `<img class="sc-photo" src="${r.photo}" data-full="${r.photo}">` : `<div class="sc-noimg">—</div>`;
      html += `<div class="shift-card${otWeek?' ot-week':''}">
        ${pic}
        <div class="sc-body">
          <div class="sc-date">${esc(r.date)}${otWeek?'<span class="ot-badge">OT week</span>':''}</div>
          <div class="sc-grid">
            <div><span class="lbl">In</span><span class="val">${esc(cleanTime(r.clockIn)||"—")}</span></div>
            <div><span class="lbl">Out</span><span class="val">${esc(cleanTime(r.clockOut)||"—")}</span></div>
            <div><span class="lbl">Break</span><span class="val">${esc(brk)}</span></div>
            <div><span class="lbl">Hours</span><span class="val">${hrs?hrs.toFixed(2):"—"}</span></div>
            <div><span class="lbl">Pay</span><span class="val">${pay?"$"+pay.toFixed(2):"—"}</span></div>
          </div>
          ${r.flag?`<div class="sc-flag">${esc(r.flag)}</div>`:""}
          <div class="sc-foot"><button class="btn btn-dark btn-sm" data-edit="${r.row}">Edit</button></div>
        </div>
      </div>`;
    });

    // OT premium = 0.5 * rate * OT hours (straight time already counted in subPay)
    Object.keys(weekOt).forEach(w=>{
      if(weekOt[w]>0){ subOtHrs += weekOt[w]; subOtPrem += 0.5*rate*weekOt[w]; }
    });
    subOtPrem = Math.round(subOtPrem*100)/100;

    grand += sub; grandPay += subPay; grandOtHrs += subOtHrs; grandOtPrem += subOtPrem;

    let totalLine = `<div class="totals" style="margin-bottom:2px"><span>${esc(name)} total</span><span>${sub.toFixed(2)} hrs · $${subPay.toFixed(2)}</span></div>`;
    if(subOtHrs>0){
      totalLine += `<div class="ot-line" style="margin-bottom:8px">${subOtHrs.toFixed(2)} OT hrs · +$${subOtPrem.toFixed(2)} premium · <b>$${(subPay+subOtPrem).toFixed(2)} with OT</b></div>`;
    }
    html += totalLine;
  });

  let grandHtml = `<div class="totals" style="border-top-width:3px;color:var(--orange)"><span>Total</span><span>${grand.toFixed(2)} hrs · $${grandPay.toFixed(2)}</span></div>`;
  if(grandOtPrem>0){
    grandHtml += `<div class="ot-line" style="text-align:right">incl. ${grandOtHrs.toFixed(2)} OT hrs · +$${grandOtPrem.toFixed(2)} · <b>$${(grandPay+grandOtPrem).toFixed(2)} total with OT</b></div>`;
  }
  html += grandHtml;
  box.innerHTML = html;

  box.querySelectorAll(".sc-photo").forEach(img=> img.addEventListener("click", ()=> showPhoto(img.dataset.full)));
  box.querySelectorAll("[data-edit]").forEach(b=> b.addEventListener("click", ()=> openEdit(b.dataset.edit)));
}

/* ---- CSV export ---- */
document.getElementById("exportCsv").addEventListener("click", ()=>{
  if(!lastRows.length){ toast("Load a date range first","err"); return; }
  const head = ["Employee","Date","Clock In","Break Out","Break In","Clock Out","Hours","Pay","Flag"];
  const lines = [head.join(",")];
  lastRows.forEach(r=>{
    lines.push([r.name, r.date, cleanTime(r.clockIn), cleanTime(r.breakOut), cleanTime(r.breakIn), cleanTime(r.clockOut), r.hours, r.pay, r.flag]
      .map(x=>`"${String(x==null?"":x).replace(/"/g,'""')}"`).join(","));
  });
  const blob = new Blob([lines.join("\n")], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const s = document.getElementById("startDate").value, e = document.getElementById("endDate").value;
  a.href = url; a.download = `busyANT_hours_${s}_to_${e}.csv`; a.click();
  URL.revokeObjectURL(url);
});

    <h3>Edit shift — ${esc(r.name)}</h3>
    <p class="muted" style="margin-top:-8px;font-size:13px">${esc(r.date)}. Tap a field to pick the time.</p>
    <div class="field"><label>Clock In</label><input type="time" id="eIn" value="${to24(r.clockIn)}"></div>
    <div class="field"><label>Break Out</label><input type="time" id="eBo" value="${to24(r.breakOut)}"></div>
    <div class="field"><label>Break In</label><input type="time" id="eBi" value="${to24(r.breakIn)}"></div>
    <div class="field"><label>Clock Out</label><input type="time" id="eOut" value="${to24(r.clockOut)}"></div>
    <div class="field"><label>Note (optional)</label><input type="text" id="eNote" placeholder="e.g. forgot to punch out"></div>
    <div class="btn-row" style="margin-top:8px">

    </div>`;
  document.getElementById("overlay").classList.add("show");

  document.getElementById("saveEdit").addEventListener("click", async ()=>{

      clockIn:from24("eIn"), breakOut:from24("eBo"), breakIn:from24("eBi"), clockOut:from24("eOut"),
      note:val("eNote")});

  });
}
function val(id){ return document.getElementById(id).value.trim(); }

/* convert "11:25 PM" -> "23:25" for the time picker */
function to24(s){
  s = cleanTime(s);
  if(!s) return "";
  const m = s.match(/(\d{1,2}):(\d{2})\s*([AP]M)/i);
  if(!m) return "";
  let hh = parseInt(m[1],10); const mm = m[2]; const ap = m[3].toUpperCase();
  if(ap==="PM" && hh<12) hh+=12;
  if(ap==="AM" && hh===12) hh=0;
  return (hh<10?"0"+hh:hh)+":"+mm;
}
/* convert picker "23:25" -> "11:25 PM" for saving */
function from24(id){
  const s = document.getElementById(id).value.trim();
  if(!s) return "";
  const m = s.match(/(\d{1,2}):(\d{2})/);
  if(!m) return "";
  let hh = parseInt(m[1],10); const mm = m[2];
  const ap = hh>=12 ? "PM":"AM";
  hh = hh%12 || 12;
  return hh+":"+mm+" "+ap;
}

    <div class="field"><label>Date</label><input type="date" id="aeDate" value="${today}"></div>
    <div class="field"><label>Clock In</label><input type="time" id="aeIn"></div>
    <div class="field"><label>Break Out</label><input type="time" id="aeBo"></div>
    <div class="field"><label>Break In</label><input type="time" id="aeBi"></div>
    <div class="field"><label>Clock Out</label><input type="time" id="aeOut"></div>
    <div class="field"><label>Note (optional)</label><input type="text" id="aeNote" placeholder="e.g. forgot to clock in"></div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-primary" id="saveEntry">Add Entry</button>
      <button class="btn btn-dark" id="closeModal">Cancel</button>
    </div>`;
  document.getElementById("overlay").classList.add("show");
  document.getElementById("closeModal").addEventListener("click", closeModal);
  document.getElementById("saveEntry").addEventListener("click", async ()=>{
    const name = document.getElementById("aeName").value;

      clockIn:ci, breakOut:from24("aeBo"), breakIn:from24("aeBi"), clockOut:from24("aeOut"),

function renderStaff(list){
  const box = document.getElementById("staffList");

  list.forEach(e=>{

    div.className = "emp-item";
    div.innerHTML = `<div>

        ${e.admin?'<span class="tag tag-admin">Admin</span>':''}

function openEmp(e){
  const isNew = !e;
  const m = document.getElementById("modalBox");
  m.innerHTML = `
    <h3>${isNew?"Add employee":"Edit "+esc(e.name)}</h3>
    <div class="field"><label>Name</label><input type="text" id="eName" value="${isNew?'':esc(e.name)}"></div>
    <div class="field"><label>PIN (4 digits)</label><input type="number" id="ePin" value="${isNew?'':esc(e.pin)}"></div>
    <div class="field"><label>Phone</label><input type="tel" id="ePhone" value="${isNew?'':esc(fmtPhone(e.phone||''))}" placeholder="(334) 555-1234"></div>
    <div class="field"><label>Hourly rate</label><input type="number" id="eRate" value="${isNew?'0':e.rate}" step="0.25"></div>
    <div class="switch-row"><label>Active</label><input type="checkbox" id="eActive" ${isNew||e.active?'checked':''} style="width:22px;height:22px"></div>
    <div class="switch-row"><label>Admin access</label><input type="checkbox" id="eAdmin" ${(!isNew&&e.admin)?'checked':''} style="width:22px;height:22px"></div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-primary" id="saveEmp">Save</button>
      <button class="btn btn-dark" id="closeModal">Cancel</button>
    </div>`;
  document.getElementById("overlay").classList.add("show");
  document.getElementById("closeModal").addEventListener("click", closeModal);
  const phoneInput = document.getElementById("ePhone");
  if(phoneInput){ phoneInput.addEventListener("input", ()=>{ phoneInput.value = fmtPhone(phoneInput.value); }); }
  document.getElementById("saveEmp").addEventListener("click", async ()=>{
    const name = val("eName"), newPin = val("ePin"), rate = val("eRate"), phone = fmtPhone(val("ePhone"));
    if(!name || newPin.length!==4){ toast("Name and a 4-digit PIN required","err"); return; }
    const btn = document.getElementById("saveEmp"); btn.innerHTML='<span class="spinner"></span>Saving…'; btn.disabled=true;
    const payload = {pin:adminPin, name, newPin, rate, phone,
      active:document.getElementById("eActive").checked, admin:document.getElementById("eAdmin").checked};
    payload.action = isNew ? "addEmployee" : "updateEmployee";
    if(!isNew) payload.row = e.row;
    const res = await api(payload);
    if(res.ok){ toast(res.message,"ok"); closeModal(); loadStaff(); }
    else { toast(res.error||"Error","err"); btn.innerHTML="Save"; btn.disabled=false; }
  });
}

/* ---- utils ---- */
function fmtPhone(s){
  const d = String(s==null?"":s).replace(/\D/g,"");   // digits only
  if(d.length === 10) return "("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6);
  if(d.length === 11 && d[0]==="1") return "("+d.slice(1,4)+") "+d.slice(4,7)+"-"+d.slice(7);
  return String(s||"");   // leave as-is if not a standard 10-digit number
}
function cleanTime(s){
  s = String(s==null?"":s).trim();
  if(!s) return "";
  // already clean like "11:10 PM"
  let m = s.match(/\b(\d{1,2}):(\d{2})\s*([AaPp][Mm])\b/);
  if(m) return m[1]+":"+m[2]+" "+m[3].toUpperCase();
  // 24-hour or full date string -> pull HH:MM and convert
  m = s.match(/(\d{1,2}):(\d{2})/);
  if(!m) return s;
  let hh = parseInt(m[1],10), mm = m[2];
  const ap = hh>=12 ? "PM":"AM";
  hh = hh%12 || 12;
  return hh+":"+mm+" "+ap;
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
let toastTimer;
function toast(msg, kind, sticky){
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show "+(kind||"");
  clearTimeout(toastTimer);
  if(!sticky) toastTimer = setTimeout(()=> t.classList.remove("show"), 2600);
}
function hideToast(){ document.getElementById("toast").classList.remove("show"); }
function showLoading(msg){ document.getElementById("loadText").textContent = msg||"Loading…"; document.getElementById("loadingOverlay").classList.add("show"); }
function hideLoading(){ document.getElementById("loadingOverlay").classList.remove("show"); }
