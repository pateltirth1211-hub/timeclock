<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>busyANT Time Clock — Manager</title>
<style>
  :root{
    --orange:#F47B20; --green:#2e7d32;
    --black:#1a1a1a;            /* near-black for dark fills (stays constant for buttons) */
    --ink:#1a1a1a; --muted:#6b6b6b; --line:#e6e6e6; --bg:#faf7f3; --card:#ffffff;
    --keybg:#f3efe9; --keypress:#eae4db; --softbg:#faf7f3;
  }
  html[data-theme="dark"]{
    --ink:#f2f2f2; --muted:#9aa0a6; --line:#2a2d31; --bg:#0e0f12; --card:#1a1c20;
    --green:#4caf50;
    --keybg:#26282d; --keypress:#30333a; --softbg:#17191d;
  }
  html[data-theme="dark"] body{ background:var(--bg); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;touch-action:manipulation;-webkit-text-size-adjust:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); min-height:100vh}
  .wrap{max-width:760px; margin:0 auto; padding:18px}

  .brand{text-align:center; margin:8px 0 18px}
  .brand h1{margin:0; font-size:26px; font-weight:800; letter-spacing:-.5px}
  .brand h1 .ant{color:var(--orange)}
  .brand p{margin:3px 0 0; color:var(--muted); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px}

  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:20px; box-shadow:0 6px 24px rgba(0,0,0,.05); margin-bottom:16px}

  /* login */
  .login{max-width:340px; margin:40px auto 0}
  .pin-display{display:flex; justify-content:center; gap:14px; margin:6px 0 22px}
  .pin-dot{width:15px; height:15px; border-radius:50%; border:2px solid var(--line)}
  .pin-dot.filled{background:var(--orange); border-color:var(--orange)}
  .keys{display:grid; grid-template-columns:repeat(3,1fr); gap:10px}
  .key{height:60px; border:none; border-radius:14px; background:var(--keybg); color:var(--ink); font-size:24px; font-weight:700; cursor:pointer; -webkit-appearance:none; appearance:none; touch-action:manipulation; user-select:none; -webkit-user-select:none}
  .key:active{background:var(--keypress)}
  .key.ghost{background:transparent}
  .key.action{background:var(--black); color:#fff; font-size:17px}

  /* tabs */
  .tabs{position:fixed; left:50%; transform:translateX(-50%); bottom:14px; z-index:60;
    width:calc(100% - 24px); max-width:740px;
    display:flex; gap:4px; background:var(--card); border:1px solid var(--line);
    border-radius:22px; padding:7px; box-shadow:0 6px 24px rgba(0,0,0,.18)}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:9px 4px;
    border:none; background:transparent; border-radius:15px; font-weight:700; font-size:11.5px; cursor:pointer;
    color:var(--muted); transition:.15s; -webkit-appearance:none; appearance:none; touch-action:manipulation}
  .tab svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round }
  .tab.active{background:var(--softbg); color:var(--orange)}
  html[data-theme="dark"] .tab.active{ background:#26282d }
  #appView{ padding-bottom:90px }   /* room for floating bar */

  h2{font-size:16px; margin:0 0 14px; font-weight:800}
  .muted{color:var(--muted)}
  .row-empty{text-align:center; color:var(--muted); padding:26px 10px; font-size:14px}

  /* live list */
  .live-item{display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--line)}
  .live-item:last-child{border-bottom:none}
  .live-name{font-weight:700; font-size:16px}
  .live-thumb{width:48px; height:48px; border-radius:10px; object-fit:cover; background:#eee; cursor:pointer; flex-shrink:0}
  .live-noimg{display:flex; align-items:center; justify-content:center; color:#bbb; font-weight:700}
  .live-since{font-size:13px; color:var(--muted); margin-top:2px}
  /* on-time schedule indicators (On Shift team rows) */
  .ot{ display:inline-block; margin-top:4px; font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; letter-spacing:.2px }
  .ot-ontime{ background:#e3f4e4; color:#2e7d32 }
  .ot-late{ background:#fff0d9; color:#c47a16 }
  .ot-early{ background:#fce8d6; color:#cb6a1e }
  .ot-unsched{ background:#dfeffc; color:#1d6fb8 }
  html[data-theme="dark"] .ot-ontime{ background:#1c3320; color:#7fd08a }
  html[data-theme="dark"] .ot-late{ background:#3a2f16; color:#e8b866 }
  html[data-theme="dark"] .ot-early{ background:#3a2a18; color:#e0a06a }
  html[data-theme="dark"] .ot-unsched{ background:#16283a; color:#7bb5e0 }
  .badge{padding:5px 12px; border-radius:999px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.4px}
  .badge-working{background:#e7f3e8; color:var(--green)}
  .badge-break{background:#fff3e0; color:var(--orange)}
  .badge-out{background:#f0f0f0; color:var(--muted)}
  .badge-auto{background:#fdeaea; color:#c0392b}

  /* controls */
  .field{margin-bottom:12px}
  .field label{display:block; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px}
  input[type=text],input[type=number],input[type=date],input[type=time],input[type=password],input[type=tel],select{
    width:100%; padding:14px; border:1px solid var(--line); border-radius:12px; font-size:16px; font-family:inherit; background:var(--card);
    -webkit-appearance:none; appearance:none; color:var(--ink); text-align:left; min-height:50px; line-height:1.2;
    display:block; box-sizing:border-box;
  }
  /* iOS renders date/time content centered & shrunk by default — force left & fill */
  input[type=date]::-webkit-date-and-time-value,
  input[type=time]::-webkit-date-and-time-value{ text-align:left; margin:0; }
  input[type=date]::-webkit-calendar-picker-indicator,
  input[type=time]::-webkit-calendar-picker-indicator{ margin-left:auto; }
  /* dark mode: force readable text in date/select pickers (iOS defaults to dark text) */
  html[data-theme="dark"] input[type=date],
  html[data-theme="dark"] input[type=time],
  html[data-theme="dark"] select{ color:var(--ink); color-scheme:dark; }
  .btn{border:none; border-radius:12px; padding:13px 18px; font-size:15px; font-weight:800; cursor:pointer}
  .btn-primary{background:var(--orange); color:#fff}
  .btn-dark{background:var(--black); color:#fff}
  html[data-theme="dark"] .btn-dark{ background:#34373d; color:#f2f2f2 }
  html[data-theme="dark"] .btn-fixit{ background:#34373d; color:#f2f2f2 }
  html[data-theme="dark"] .btn-sm.btn-dark{ background:#34373d }
  .btn-sm{padding:8px 12px; font-size:13px; border-radius:10px}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap}
  .presets{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px}
  .preset{ border:1px solid var(--line); background:var(--card); color:var(--ink); border-radius:999px;
    padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; -webkit-appearance:none; appearance:none;
    touch-action:manipulation }
  .preset:active{ background:#f0ece6 }
  .preset.active{ background:var(--orange); color:#fff; border-color:var(--orange) }
  .date-row{display:flex; gap:10px}
  .date-row .field{flex:1; min-width:0}
  @media (max-width:480px){
    .date-row{flex-direction:column; gap:0}
  }

  /* timesheet table */
  .ts-table{width:100%; border-collapse:collapse; font-size:13px}
  .ts-table th{text-align:left; padding:8px 6px; border-bottom:2px solid var(--line); font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted)}
  .ts-table td{padding:9px 6px; border-bottom:1px solid #f0f0f0; vertical-align:middle}
  .ts-table tr:last-child td{border-bottom:none}
  .flagcell{color:var(--orange); font-weight:700; font-size:11px}
  .thumb{width:34px; height:34px; border-radius:8px; object-fit:cover; cursor:pointer; background:#eee}
  .totals{margin-top:14px; padding-top:14px; border-top:2px solid var(--line); display:flex; justify-content:space-between; font-weight:800; font-size:15px}
  .name-sub{font-weight:700}

  /* employees */
  .emp-item{display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--line)}
  .emp-item:last-child{border-bottom:none}
  .emp-name{font-weight:700}
  .emp-meta{font-size:12px; color:var(--muted); margin-top:2px}
  .tag{display:inline-block; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; padding:2px 7px; border-radius:6px; margin-left:5px}
  .tag-admin{background:#fff3e0; color:var(--orange)}
  .tag-off{background:#f0f0f0; color:var(--muted)}

  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; padding:18px; z-index:50}
  .overlay.show{display:flex}
  .modal{background:var(--card); border-radius:18px; padding:22px; width:100%; max-width:420px; max-height:90vh; overflow:auto}
  .modal h3{margin:0 0 16px; font-size:18px; font-weight:800}
  .modal-photo{display:block; width:200px; height:200px; border-radius:14px; object-fit:cover; margin:0 auto}
  .switch-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0}
  .switch-row label{font-weight:700; font-size:14px}

  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(120px); background:var(--black); color:#fff; padding:14px 22px; border-radius:13px; font-weight:700; box-shadow:0 10px 30px rgba(0,0,0,.25); transition:transform .3s; z-index:60; text-align:center; max-width:90vw}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.err{background:#c62828}
  .toast.ok{background:var(--green)}
  .spinner{display:inline-block; width:16px; height:16px; border:3px solid rgba(0,0,0,.15); border-top-color:var(--orange); border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .center{text-align:center; padding:30px}
  .hidden{display:none}

  /* logo header + watermark */
  .watermark{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    width:min(80vw,520px); opacity:.04; pointer-events:none; z-index:0 }
  .wrap{ position:relative; z-index:1 }
  .brand-logo{ height:140px; width:auto }
  .brand{ text-align:center; position:relative }
  #themeToggle{ position:fixed; top:14px; right:14px; z-index:50; width:42px; height:42px; border-radius:50%;
    border:1px solid var(--line); background:var(--card); font-size:20px; cursor:pointer; line-height:1;
    box-shadow:0 2px 8px rgba(0,0,0,.08); -webkit-appearance:none; appearance:none; touch-action:manipulation }
  #themeToggle:active{ transform:scale(.92) }

  /* loading overlay */
  #loadingOverlay{ position:fixed; inset:0; z-index:200; background:rgba(250,247,243,.96);
    display:none; flex-direction:column; align-items:center; justify-content:center }
  html[data-theme="dark"] #loadingOverlay{ background:rgba(14,15,18,.96) }
  #loadingOverlay.show{ display:flex }
  #loadingOverlay img{ width:min(55vw,240px); animation:floatm 3.5s ease-in-out infinite }
  @keyframes floatm{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-14px) } }
  .load-spin{ width:34px; height:34px; border:4px solid rgba(0,0,0,.12); border-top-color:var(--orange);
    border-radius:50%; animation:spin .7s linear infinite; margin-top:26px }
  .load-text{ margin-top:14px; font-weight:700; color:var(--muted) }

  /* timesheet CARD layout (phone) */
  .shift-card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px;
    margin-bottom:10px; display:flex; gap:12px; align-items:flex-start }
  .shift-card .sc-photo{ width:52px; height:52px; border-radius:10px; object-fit:cover; background:#eee; flex-shrink:0; cursor:pointer }
  .shift-card .sc-noimg{ width:52px; height:52px; border-radius:10px; background:#f0f0f0; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; color:#bbb; font-weight:700 }
  .sc-body{ flex:1; min-width:0 }
  .sc-date{ font-weight:800; font-size:14px; margin-bottom:8px }
  .sc-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px 12px; font-size:13px }
  .sc-grid .lbl{ color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.3px; display:block }
  .sc-grid .val{ font-weight:700 }
  .sc-flag{ color:var(--orange); font-weight:700; font-size:12px; margin-top:6px }
  .sc-foot{ display:flex; justify-content:flex-end; margin-top:10px }

  /* today summary card */
  .today-card{ background:linear-gradient(135deg,#fff7f0,#fdfaf6); border:1px solid var(--line);
    border-radius:14px; padding:16px; margin-bottom:16px; display:none }
  .today-card.show{ display:block }
  .today-card h3{ margin:0 0 10px; font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted) }
  .today-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:8px }
  .today-daterow{ display:flex; flex-direction:column; align-items:center; gap:4px; flex:1 }
  .today-daterow input[type=date]{ width:auto; min-height:34px; padding:6px 10px; font-size:13px; border-radius:10px; text-align:center }
  .day-arrow{ width:40px; height:40px; flex-shrink:0; border:1px solid var(--line); background:var(--card); border-radius:12px;
    font-size:22px; font-weight:800; color:var(--ink); cursor:pointer; line-height:1; -webkit-appearance:none; appearance:none }
  .day-arrow:active{ background:#f0ece6 }
  .day-arrow:disabled{ opacity:.3; cursor:default }
  .mini-spin{ display:inline-block; width:18px; height:18px; border:3px solid rgba(0,0,0,.12);
    border-top-color:var(--orange); border-radius:50%; animation:spin .7s linear infinite; vertical-align:-2px }
  .today-stats{ display:flex; gap:18px; flex-wrap:wrap }
  .today-stat .num{ font-size:24px; font-weight:800 }
  .today-stat .num.orange{ color:var(--orange) }
  .today-stat .lbl{ font-size:12px; color:var(--muted); font-weight:600 }

  /* overtime highlighting */
  .ot-week{ background:#fff3e0; border-color:#ffcc80 }
  .ot-badge{ display:inline-block; background:var(--orange); color:#fff; font-size:11px; font-weight:800;
    padding:2px 8px; border-radius:999px; letter-spacing:.3px; margin-left:6px; vertical-align:1px }
  .ot-line{ font-size:13px; color:var(--orange); font-weight:700; margin-top:2px }

  /* weekly grouping */
  .emp-panel{ border:1px solid var(--line); border-radius:16px; overflow:hidden; margin-bottom:22px;
    box-shadow:0 2px 10px rgba(0,0,0,.04) }
  .emp-header{ background:var(--black); color:#fff; font-size:18px; font-weight:800; padding:13px 16px; letter-spacing:.2px }
  .emp-body{ padding:14px 14px 6px }
  .emp-total{ border-top:2px solid var(--ink); margin-top:6px; padding-top:10px; font-size:15px; font-weight:800 }
  .week-head{ font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; color:var(--muted);
    margin:10px 0 8px; padding-bottom:4px; border-bottom:1px solid var(--line) }
  .emp-body > .week-head:first-child{ margin-top:0 }
  .week-head.ot{ color:var(--orange) }
  .week-total{ font-size:14px; margin-bottom:2px; color:var(--muted) }
  .grand-total{ display:flex; justify-content:space-between; align-items:center; background:var(--orange); color:#fff;
    font-weight:800; font-size:17px; padding:14px 16px; border-radius:14px; margin-top:6px }

  /* labor cost header */
  .labor-head{ text-align:center; margin-bottom:18px }
  .labor-daynav{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:14px }
  .labor-daylabel{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px }
  .labor-daylabel #laborDayName{ font-weight:800; font-size:15px }
  .labor-daylabel input[type=date]{ width:auto; min-height:32px; padding:5px 10px; font-size:12px; border-radius:9px; text-align:center }
  .labor-cost-big{ font-size:40px; font-weight:800; letter-spacing:-1px; line-height:1 }
  .labor-cost-sub{ font-size:13px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-top:4px }
  .labor-payblock{ max-width:340px; margin:8px auto 0; text-align:left }
  .labor-payrow{ display:flex; justify-content:space-between; align-items:baseline; padding:3px 0 }
  .lp-label{ font-size:15px; color:var(--muted); font-weight:600 }
  .lp-val{ font-size:22px; font-weight:800; letter-spacing:-.5px }
  .labor-variance{ text-align:right; font-size:13px; font-weight:800; margin-top:5px; padding-top:6px; border-top:1px solid var(--line) }
  .labor-variance.v-under{ color:#2e7d32 }
  .labor-variance.v-over{ color:#c0392b }
  .labor-variance.v-on{ color:var(--muted) }

  /* hourly bar chart */
  .labor-detail{ min-height:22px; text-align:center; font-size:14px; font-weight:700; color:var(--ink); margin-bottom:8px }
  .labor-detail .muted{ color:var(--muted); font-weight:600 }
  .labor-chart-wrap{ display:flex; align-items:stretch; gap:6px; margin-bottom:6px }
  .labor-axis{ display:flex; flex-direction:column; justify-content:space-between; width:34px; flex-shrink:0;
    height:160px; padding:6px 0 0; font-size:10px; color:var(--muted); text-align:right }
  .labor-axis span{ line-height:1; transform:translateY(-4px) }
  .labor-chart{ display:flex; align-items:flex-end; gap:3px; height:160px; padding:10px 0 0; flex:1;
    border-bottom:2px solid var(--line); border-left:1px solid var(--line); overflow-x:auto }
  .lc-bar-wrap{ flex:1; min-width:13px; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; cursor:pointer }
  .lc-bar{ width:70%; background:var(--orange); border-radius:4px 4px 0 0; min-height:2px; transition:height .2s, opacity .15s }
  .lc-bar.empty{ background:#ececec }
  .lc-bar-wrap.sel .lc-bar{ background:var(--black) }
  .lc-hourlabels{ display:flex; gap:3px; margin-bottom:18px; font-size:10px; color:var(--muted); padding-left:40px }
  .lc-hourlabels span{ flex:1; min-width:13px; text-align:center }

  /* team filters */
  .team-filters{ margin-bottom:12px }
  .team-search{ width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:12px; font-size:15px;
    -webkit-appearance:none; appearance:none; margin-bottom:10px }
  .team-tabs{ display:flex; gap:6px; flex-wrap:wrap }
  .team-tab{ flex:1; min-width:64px; border:1px solid var(--line); background:var(--card); color:var(--muted); border-radius:10px;
    padding:9px 6px; font-size:13px; font-weight:700; cursor:pointer; -webkit-appearance:none; appearance:none; touch-action:manipulation }
  .team-tab.active{ background:var(--black); color:#fff; border-color:var(--black) }

  /* title pills (color-coded by role) */
  .title-pill{ display:inline-block; font-size:11px; font-weight:800; padding:2px 9px; border-radius:999px;
    letter-spacing:.2px; vertical-align:1px }
  .t-deli{ background:#fde2e0; color:#c0392b }
  .t-cashier{ background:#dfeffc; color:#1d6fb8 }
  .t-stocker{ background:#e3f4e4; color:#2e7d32 }
  .t-meat{ background:#f3e0ef; color:#9b2d8e }
  .t-manager{ background:#fff0d9; color:#c47a16 }
  .t-owner{ background:#1a1a1a; color:#fff }
  .t-none{ background:#eee; color:#999 }

  /* schedule tab */
  .sched-counts{ display:flex; flex-wrap:wrap; gap:6px; margin:4px 0 16px; justify-content:center }
  .sched-count{ font-size:11px; font-weight:800; padding:4px 11px; border-radius:999px; white-space:nowrap }
  .sc-ontime{ background:#e3f4e4; color:#2e7d32 }
  .sc-late{ background:#fff0d9; color:#c47a16 }
  .sc-early{ background:#fce8d6; color:#cb6a1e }
  .sc-noshow{ background:#fde2e0; color:#c0392b }
  .sc-unsched{ background:#dfeffc; color:#1d6fb8 }
  .sc-upcoming{ background:#ece9f7; color:#5b4b9e }
  .sc-done{ background:#eef0f2; color:#5a6068 }
  html[data-theme="dark"] .sc-done{ background:#22252a; color:#aab1b8 }

  .sched-sub{ font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
    margin:18px 0 10px; padding-bottom:5px; border-bottom:1px solid var(--line) }
  .sched-card{ border:1px solid var(--line); border-radius:14px; padding:13px 14px; margin-bottom:9px; border-left:4px solid var(--line) }
  .sched-card.s-late{ border-left-color:#c47a16 }
  .sched-card.s-early{ border-left-color:#cb6a1e }
  .sched-card.s-noshow{ border-left-color:#c0392b }
  .sched-card.s-unsched{ border-left-color:#1d6fb8 }
  .sched-card.s-upcoming{ border-left-color:#5b4b9e }
  .sched-card.s-ontime{ border-left-color:#2e7d32 }
  .sched-card.s-done{ border-left-color:#3aa54a }
  .sched-row1{ display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:6px }
  .sched-who{ font-weight:800; font-size:15px }
  .sched-badge{ font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.4px;
    padding:3px 9px; border-radius:999px; white-space:nowrap; height:fit-content }

<script>
/* ---- block pinch-zoom (double-tap handled by CSS touch-action) ---- */
document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
document.addEventListener('gesturechange', function(e){ e.preventDefault(); });
document.addEventListener('gestureend', function(e){ e.preventDefault(); });
document.addEventListener('touchmove', function(e){
  if (e.touches.length > 1) { e.preventDefault(); }
}, { passive: false });

const API = "https://busyant-proxy.pateltirth1211.workers.dev";

/* ---- dark / light theme (remembers choice) ---- */
(function initTheme(){
  let saved = "light";
  try { saved = localStorage.getItem("busyant-theme") || "light"; } catch(e){}
  applyTheme(saved);
})();
function applyTheme(mode){
  document.documentElement.setAttribute("data-theme", mode==="dark"?"dark":"light");
  const btn = document.getElementById("themeToggle");
  if(btn) btn.textContent = (mode==="dark") ? "☀️" : "🌙";
}
document.getElementById("themeToggle").addEventListener("click", ()=>{
  const cur = document.documentElement.getAttribute("data-theme")==="dark" ? "dark" : "light";
  const next = cur==="dark" ? "light" : "dark";
  applyTheme(next);
  try { localStorage.setItem("busyant-theme", next); } catch(e){}
});

let adminPin = "";
let pinEntry = "";
let lastRows = [];
let rateCache = {};

/* ---- API (text/plain POST with JSON body — CORS-safe, handles photos) ---- */
async function api(payload){
  const res = await fetch(API, { method:"POST", body: JSON.stringify(payload) });
  const text = await res.text();
  let data = JSON.parse(text);
  if (typeof data === "string") data = JSON.parse(data);  // unwrap if double-encoded
  return data;
}

/* ---- login ---- */
function renderPin(){
  document.querySelectorAll("#pinDisplay .pin-dot").forEach((d,i)=> d.classList.toggle("filled", i < pinEntry.length));
}
document.querySelectorAll("#loginView .key[data-k]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const k = btn.dataset.k;
    if(k==="del") pinEntry = pinEntry.slice(0,-1);
    else if(pinEntry.length<4) pinEntry += k;
    renderPin();
    if(pinEntry.length===4) tryLogin();
  });
});
async function tryLogin(){
  showLoading("Checking…");
  try{
    const r = await api({action:"getLiveStatus", pin:pinEntry});
    hideLoading();
    if(!r.ok){ toast("Not an admin PIN","err"); pinEntry=""; renderPin(); return; }
    adminPin = pinEntry;
    document.getElementById("loginView").classList.add("hidden");
    document.getElementById("appView").classList.remove("hidden");
    populateEmpFilter();
    setDefaultDates();
    loadLive();
  }catch(e){ hideLoading(); toast("Connection error","err"); pinEntry=""; renderPin(); }
}

/* ---- tabs ---- */
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    const tab = t.dataset.tab;
    document.getElementById("liveTab").classList.toggle("hidden", tab!=="live");
    document.getElementById("scheduleTab").classList.toggle("hidden", tab!=="schedule");
    document.getElementById("sheetsTab").classList.toggle("hidden", tab!=="sheets");
    document.getElementById("staffTab").classList.toggle("hidden", tab!=="staff");
    document.getElementById("actionsTab").classList.toggle("hidden", tab!=="actions");
    if(tab==="live") loadLive();
    if(tab==="schedule") loadSchedule();
    if(tab==="staff") loadStaff();
    if(tab==="actions") loadActions();
  });
});

/* ---- ON SHIFT / LABOR VIEW ---- */
let laborDate = null;       // yyyy-mm-dd; null = today
let teamCache = {};         // date -> {team, labor}
let teamFilter = "ALL";
let teamSearchText = "";

async function loadLive(force){
  const dateParam = laborDate || iso(new Date());
  const isToday = dateParam === iso(new Date());
  const isPast = dateParam < iso(new Date());

  // non-today days: once cached, read cache (past plans are settled; future re-pulls on 5AM job)
  if(!force && !isToday && teamCache[dateParam]){
    renderLabor(teamCache[dateParam], dateParam);
    return;
  }
  // instant header, spinners for data
  renderLaborShell(dateParam, true);

  try{
    const [teamR, laborR] = await Promise.all([
      api({action:"getTeamDay", pin:adminPin, date:dateParam}),
      api({action:"getHourlyLabor", pin:adminPin, date:dateParam})
    ]);
    // schedule comparison (on-time indicators + scheduled pay).
    // Auto-sync when there are no SCHEDULED rows (needed for pay), regardless of unscheduled.
    let schedR = await api({action:"getSchedule", pin:adminPin, date:dateParam});
    let sched = (schedR && schedR.ok) ? schedR : {scheduled:[], unscheduled:[]};
    let scheduleMissing = false;
    if((sched.scheduled||[]).length===0){
      const sy = await api({action:"syncSchedule", pin:adminPin, date:dateParam});
      if(sy && sy.ok){
        schedR = await api({action:"getSchedule", pin:adminPin, date:dateParam});
        if(schedR && schedR.ok) sched = schedR;
      }
      // if STILL no scheduled rows after a sync attempt, this day genuinely has no
      // schedule data (Connecteam no longer has it, or none was published) → show "—"
      if((sched.scheduled||[]).length===0) scheduleMissing = true;
    }
    const data = { team: teamR.ok?teamR.team:[], labor: laborR.ok?laborR:{hours:[],total:0},
                   sched: sched, scheduleMissing: scheduleMissing };
    teamCache[dateParam] = data;
    if((laborDate || iso(new Date())) === dateParam) renderLabor(data, dateParam);
  }catch(e){}
}

function renderLaborShell(dateParam, loading){
  const todayIso = iso(new Date());
  const isToday = dateParam === todayIso;
  document.getElementById("laborDayName").textContent = isToday ? "Today" : prettyDate(dateParam);
  const dp = document.getElementById("laborDate");
  const maxD = new Date(); maxD.setDate(maxD.getDate()+14);
  const minD = new Date(); minD.setDate(minD.getDate()-60);
  dp.max = iso(maxD);
  dp.min = iso(minD);
  dp.value = dateParam;
  document.getElementById("laborNext").disabled = (dateParam >= iso(maxD));
  document.getElementById("laborPrev").disabled = (dateParam <= iso(minD));
  if(loading){
    document.getElementById("schedPayVal").innerHTML = '<span class="mini-spin"></span>';
    document.getElementById("actualPayVal").innerHTML = '<span class="mini-spin"></span>';
    document.getElementById("laborVariance").textContent = '';
    document.getElementById("laborChart").innerHTML = '';
    document.getElementById("liveList").innerHTML = '<div class="center"><span class="spinner"></span></div>';
  }
}

function renderLabor(data, dateParam){
  renderLaborShell(dateParam, false);
  const actual = data.labor.total || 0;
  const vEl = document.getElementById("laborVariance");
  document.getElementById("actualPayVal").textContent = "$" + actual.toFixed(2);

  if(data.scheduleMissing){
    // no schedule data for this day (Connecteam no longer has it / none published)
    document.getElementById("schedPayVal").textContent = "—";
    vEl.textContent = "No schedule data";
    vEl.className = "labor-variance v-on";
  } else {
    const scheduled = (data.sched && typeof data.sched.scheduledPay==="number") ? data.sched.scheduledPay : 0;
    document.getElementById("schedPayVal").textContent = "$" + scheduled.toFixed(2);
    const isFuture = dateParam > iso(new Date());
    const diff = actual - scheduled;
    if(isFuture){
      // future day: nothing punched yet — "Actual" is just what's happened so far (usually $0)
      vEl.textContent = "Upcoming — planned $" + scheduled.toFixed(2);
      vEl.className = "labor-variance v-on";
    } else if(Math.abs(diff) < 0.01){
      vEl.textContent = "On budget";
      vEl.className = "labor-variance v-on";
    } else if(diff < 0){
      vEl.textContent = "Under by $" + Math.abs(diff).toFixed(2);
      vEl.className = "labor-variance v-under";
    } else {
      vEl.textContent = "Over by $" + diff.toFixed(2);
      vEl.className = "labor-variance v-over";
    }
  }
  renderChart(data.labor.hours||[], data.labor.names||[]);
  renderTeam(data.team||[], data.sched||{scheduled:[],unscheduled:[]});
}

/* hourly bar chart — 4 AM to midnight, $10-increment axis, tappable bars */
function renderChart(hours, names){
  const box = document.getElementById("laborChart");
  const axis = document.getElementById("laborAxis");
  const detail = document.getElementById("laborDetail");
  detail.innerHTML = '<span class="muted">Tap a bar for details</span>';
  if(!hours.length){ box.innerHTML = '<div class="row-empty" style="margin:auto">No labor data.</div>'; axis.innerHTML=""; return; }

  const startH = 6;   // 6 AM
  const endH = 22;    // 10 PM (inclusive)
  const slice = hours.slice(startH, endH+1);
  const peak = Math.max(...slice, 0);
  // round axis top up to next $10 (minimum $10)
  const top = Math.max(10, Math.ceil(peak/10)*10);

  // axis labels from top down to 0 in $10 steps
  let axisHtml = "";
  for(let v=top; v>=0; v-=10){ axisHtml += `<span>$${v}</span>`; }
  axis.innerHTML = axisHtml;

  let bars = "";
  for(let h=startH; h<=endH; h++){
    const val = hours[h]||0;
    const pct = top>0 ? Math.round((val/top)*100) : 0;
    bars += `<div class="lc-bar-wrap" data-h="${h}"><div class="lc-bar ${val<=0?'empty':''}" style="height:${val<=0?2:Math.max(pct,3)}%"></div></div>`;
  }
  box.innerHTML = bars;

  let labels = "";
  for(let h=startH; h<=endH; h++){
    // show a marker at 6A, 9A, 12P, 3P, 6P, 9P (every 3 hours)
    labels += `<span>${((h-startH)%3===0)?hourLabelShort(h):''}</span>`;
  }
  let lab = document.getElementById("laborChartLabels");
  if(!lab){ lab = document.createElement("div"); lab.id="laborChartLabels"; lab.className="lc-hourlabels"; document.querySelector(".labor-chart-wrap").after(lab); }
  lab.innerHTML = labels;

  // tap handlers
  box.querySelectorAll(".lc-bar-wrap").forEach(w=>{
    w.addEventListener("click", ()=>{
      const h = Number(w.dataset.h);
      box.querySelectorAll(".lc-bar-wrap").forEach(x=>x.classList.remove("sel"));
      w.classList.add("sel");
      const val = hours[h]||0;
      const who = (names[h]&&names[h].length) ? names[h].join(", ") : "Nobody";
      detail.innerHTML = `${hourLabel(h)} · <span style="color:var(--orange)">$${val.toFixed(2)}</span> · <span class="muted">${esc(who)}</span>`;
    });
  });
}
function hourLabel(h){ const ap=h>=12?"PM":"AM"; let hh=h%12||12; return hh+" "+ap; }
function hourLabelShort(h){ const ap=h>=12?"P":"A"; let hh=h%12||12; return hh+ap; }

/* team list */
function renderTeam(team, sched){
  const box = document.getElementById("liveList");
  let list = team.slice();
  if(teamFilter!=="ALL") list = list.filter(p=>p.status===teamFilter);
  if(teamSearchText) list = list.filter(p=>p.name.toLowerCase().includes(teamSearchText.toLowerCase()));

  if(!list.length){ box.innerHTML = '<div class="row-empty">No results found.</div>'; return; }

  // build a name -> [schedule entries] lookup so we can match each team row
  // to the right shift (matters for split shifts). Match on clock-in time.
  const schedByName = {};
  ((sched&&sched.scheduled)||[]).forEach(s=>{
    (schedByName[s.name] = schedByName[s.name] || []).push(s);
  });
  const unschedByName = {};
  ((sched&&sched.unscheduled)||[]).forEach(u=>{
    (unschedByName[u.name] = unschedByName[u.name] || []).push(u);
  });

  box.innerHTML = "";
  list.forEach(p=>{
    const onBreak = p.state==="ON_BREAK";
    const div = document.createElement("div");
    div.className = "live-item";
    const pic = p.photo ? `<img class="live-thumb" src="${p.photo}" data-full="${p.photo}">` : `<div class="live-thumb live-noimg">—</div>`;
    let statusBadge;
    if(p.status==="IN") statusBadge = `<span class="badge ${onBreak?'badge-break':'badge-working'}">${onBreak?'On break':'In'}</span>`;
    else if(p.status==="AUTO_OUT") statusBadge = `<span class="badge badge-auto">Auto out</span>`;
    else statusBadge = `<span class="badge badge-out">Out</span>`;
    const timeline = p.status==="IN" ? `Since ${esc(p.since)}` : `${esc(p.since)} – ${esc(p.until||'—')}`;
    const schedBadge = scheduleBadgeFor(p, schedByName, unschedByName);
    div.innerHTML = `<div style="display:flex;align-items:center;gap:12px">
      ${pic}
      <div><div class="live-name">${esc(p.name)} ${titlePill(p.title)}</div>
      <div class="live-since">${timeline}</div>
      ${schedBadge}</div></div>
      ${statusBadge}`;
    box.appendChild(div);
  });
  box.querySelectorAll(".live-thumb[data-full]").forEach(img=> img.addEventListener("click", ()=> showPhoto(img.dataset.full)));
}

/* pick the right schedule verdict for a team-list row and return a small badge.
   Matches split shifts by clock-in time; suppresses end-checks for AUTO_OUT. */
function scheduleBadgeFor(p, schedByName, unschedByName){
  const cands = schedByName[p.name] || [];
  // match the scheduled shift whose actual-in equals this row's clock-in
  let match = cands.find(s=> s.actualIn && s.actualIn === p.since);
  // fallback: if no exact clock-in match but exactly one shift, use it
  if(!match && cands.length===1) match = cands[0];

  if(match){
    let status = match.status;
    // AUTO_OUT: the 10 PM cutoff isn't a real end — show start-side verdict only
    if(p.status==="AUTO_OUT" && (status==="LEFT_EARLY" || status==="DONE")){
      status = (match.minsLate ? "LATE" : "ON_TIME");
    }
    if(status==="ON_TIME") return `<span class="ot ot-ontime">✓ On time</span>`;
    if(status==="DONE")    return `<span class="ot ot-ontime">✓ On time</span>`;
    if(status==="LATE")    return `<span class="ot ot-late">⚠ ${match.minsLate?('In '+match.minsLate+' min late'):'Late'}</span>`;
    if(status==="LEFT_EARLY") return `<span class="ot ot-early">↩ ${match.minsEarly?('Out '+match.minsEarly+' min early'):'Left early'}</span>`;
    // NO_SHOW/UPCOMING shouldn't occur for someone who punched; ignore
    return "";
  }
  // not on the schedule at all → unscheduled (only if they actually have a punch, which team rows do)
  if((unschedByName[p.name]||[]).length) return `<span class="ot ot-unsched">+ Unscheduled</span>`;
  return "";
}

function titlePill(title){

    const cls = map[t.toLowerCase()] || "t-none";

}

/* ---- SCHEDULE VIEW (plan vs reality, Connecteam) ---- */
let schedDate = null;        // yyyy-mm-dd; null = today
let schedCache = {};         // date -> getSchedule result
const SCHED_MAX_PAST_DAYS = 60;
const SCHED_MAX_FUTURE_DAYS = 14;

/* Option 3 flow: try getSchedule first (cached in Schedule tab); if it
   returns zero scheduled rows, auto-sync that date once, then re-fetch. */
async function loadSchedule(force){
  const dateParam = schedDate || iso(new Date());

  if(!force && schedCache[dateParam]){
    renderSchedule(schedCache[dateParam], dateParam);
    return;
  }
  renderSchedShell(dateParam, true);

  try{
    let r = await api({action:"getSchedule", pin:adminPin, date:dateParam});
    let scheduled = (r.ok && r.scheduled) ? r.scheduled : [];

    // nothing cached for this day yet → pull from Connecteam once, then re-read
    if(force || scheduled.length===0){
      const sy = await api({action:"syncSchedule", pin:adminPin, date:dateParam});
      if(sy && sy.ok){
        r = await api({action:"getSchedule", pin:adminPin, date:dateParam});
      } else if(sy && sy.error){
        renderSchedError(dateParam, sy.error);
        return;
      }
    }
    if(r.ok){
      schedCache[dateParam] = r;
      if((schedDate || iso(new Date())) === dateParam) renderSchedule(r, dateParam);
    } else {
      renderSchedError(dateParam, r.error || "Could not load schedule");
    }
  }catch(e){ renderSchedError(dateParam, "Connection error"); }
}

function renderSchedShell(dateParam, loading){
  const todayIso = iso(new Date());
  const isToday = dateParam === todayIso;
  document.getElementById("schedDayName").textContent = isToday ? "Today" : prettyDate(dateParam);
  const dp = document.getElementById("schedDate");
  // picker range: 60 days back, 14 days forward
  const maxD = new Date(); maxD.setDate(maxD.getDate()+SCHED_MAX_FUTURE_DAYS);
  const minD = new Date(); minD.setDate(minD.getDate()-SCHED_MAX_PAST_DAYS);
  dp.max = iso(maxD);
  dp.min = iso(minD);
  dp.value = dateParam;
  document.getElementById("schedNext").disabled = (dateParam >= iso(maxD));
  document.getElementById("schedPrev").disabled = (dateParam <= iso(minD));
  if(loading){
    document.getElementById("schedCounts").innerHTML = '';
    document.getElementById("schedList").innerHTML = '<div class="center"><span class="spinner"></span></div>';
  }
}

function renderSchedError(dateParam, msg){
  renderSchedShell(dateParam, false);
  document.getElementById("schedCounts").innerHTML = '';
  document.getElementById("schedList").innerHTML =
    `<div class="sched-empty">${esc(msg)}</div>`;
}

const SCHED_BADGES = {
  ON_TIME:   ["On time",  "sched-badge sc-ontime", "s-ontime"],
  LATE:      ["Late",     "sched-badge sc-late",   "s-late"],
  LEFT_EARLY:["Left early","sched-badge sc-early",  "s-early"],
  NO_SHOW:   ["No-show",  "sched-badge sc-noshow", "s-noshow"],
  DONE:      ["Done",     "sched-badge sc-done",   "s-done"],
  UPCOMING:  ["Upcoming", "sched-badge sc-upcoming","s-upcoming"],
  UNSCHEDULED:["Unscheduled","sched-badge sc-unsched","s-unsched"]
};

function renderSchedule(r, dateParam){
  renderSchedShell(dateParam, false);

  // count pills
  const c = r.counts || {};
  const pills = [];
  if(c.onTime)     pills.push(`<span class="sched-count sc-ontime">✓ ${c.onTime} on time</span>`);
  if(c.late)       pills.push(`<span class="sched-count sc-late">⚠ ${c.late} late</span>`);
  if(c.leftEarly)  pills.push(`<span class="sched-count sc-early">↩ ${c.leftEarly} left early</span>`);
  if(c.noShow)     pills.push(`<span class="sched-count sc-noshow">✗ ${c.noShow} no-show</span>`);
  if(c.done)       pills.push(`<span class="sched-count sc-done">${c.done} done</span>`);
  if(c.upcoming)   pills.push(`<span class="sched-count sc-upcoming">○ ${c.upcoming} upcoming</span>`);
  if(c.unscheduled)pills.push(`<span class="sched-count sc-unsched">+ ${c.unscheduled} unscheduled</span>`);
  document.getElementById("schedCounts").innerHTML =
    pills.length ? pills.join("") : '<span class="sched-count sc-done">No shifts scheduled</span>';

  const scheduled = r.scheduled || [];
  const unsched = r.unscheduled || [];
  let html = "";

  if(scheduled.length){
    html += `<div class="sched-sub">Scheduled (${scheduled.length})</div>`;
    scheduled.forEach(s=>{
      const [label, badgeCls, cardCls] = SCHED_BADGES[s.status] || ["", "sched-badge sc-done", ""];
      const isUpcoming = s.status==="UPCOMING";
      const inMiss = !s.actualIn && !isUpcoming;   // upcoming = not yet, not a miss
      let delta = "";
      if(s.minsLate)  delta += `<div class="sched-delta late">In ${s.minsLate} min late</div>`;
      if(s.minsEarly) delta += `<div class="sched-delta early">Out ${s.minsEarly} min early</div>`;
      const actualHtml = s.actualIn
        ? esc(s.actualIn) + (s.actualOut ? (" – "+esc(s.actualOut)) : " – on shift")
        : (isUpcoming ? "Not started" : "—");
      html += `
        <div class="sched-card ${cardCls}">
          <div class="sched-row1">
            <div class="sched-who">${esc(s.name)} ${titlePill(s.title)}</div>
            <span class="${badgeCls}">${label}</span>
          </div>
          <div class="sched-times">
            <div><span class="lbl">Scheduled</span><span class="val">${esc(s.schedStart)} – ${esc(s.schedEnd)}</span></div>
            <div><span class="lbl">Actual</span><span class="val ${inMiss?'miss':''}">${actualHtml}</span></div>
          </div>
          ${delta}
        </div>`;
    });
  }

  if(unsched.length){
    html += `<div class="sched-sub">Unscheduled (${unsched.length})</div>`;
    unsched.forEach(u=>{
      html += `
        <div class="sched-card s-unsched">
          <div class="sched-row1">
            <div class="sched-who">${esc(u.name)} ${titlePill(u.title)}</div>
            <span class="sched-badge sc-unsched">Unscheduled</span>
          </div>
          <div class="sched-times">
            <div><span class="lbl">Clocked</span><span class="val">${esc(u.actualIn)}${u.actualOut?(" – "+esc(u.actualOut)):" – on shift"}</span></div>
            ${u.hours!==""&&u.hours!=null?`<div><span class="lbl">Hours</span><span class="val">${u.hours}</span></div>`:""}
          </div>
        </div>`;
    });
  }

  if(!scheduled.length && !unsched.length){
    html = `<div class="sched-empty">No published shifts and no punches for this day.</div>`;
  }
  document.getElementById("schedList").innerHTML = html;
}

/* Monday of the week containing d */
function mondayOf(d){
  const x = new Date(d);
  const dow = x.getDay();              // 0=Sun..6=Sat
  const diff = (dow===0) ? 6 : dow-1;  // days since Monday
  x.setDate(x.getDate()-diff);
  x.setHours(0,0,0,0);
  return x;
}

function applyPreset(kind){
  const today = new Date();
  let start, end;
  if(kind==="thisweek"){
    start = mondayOf(today); end = new Date(today);
  } else if(kind==="lastweek"){
    const thisMon = mondayOf(today);
    end = new Date(thisMon); end.setDate(end.getDate()-1);      // last Sunday
    start = new Date(end); start = mondayOf(start);             // that week's Monday
  } else if(kind==="2weeks"){
    start = mondayOf(today); start.setDate(start.getDate()-7);  // start of last week
    end = new Date(today);
  } else if(kind==="thismonth"){
    start = new Date(today.getFullYear(), today.getMonth(), 1);
    end = new Date(today);
  }
  document.getElementById("startDate").value = iso(start);
  document.getElementById("endDate").value = iso(end);
  loadSheets();
}

function renderSheets(allRows){
  const box = document.getElementById("sheetsResult");
  const filter = document.getElementById("empFilter").value;
  const rows = filter ? allRows.filter(r=>r.name===filter) : allRows;
  if(!rows.length){ box.innerHTML = '<div class="row-empty">No shifts in this range.</div>'; return; }

  // does the data span more than one week? -> weekly grouping
  const distinctWeeks = {};
  rows.forEach(r=>{ distinctWeeks[r.week]=true; });
  const multiWeek = Object.keys(distinctWeeks).length > 1;

  // group by employee
  const byName = {};
  rows.forEach(r=>{ (byName[r.name]=byName[r.name]||[]).push(r); });

  let html = "";
  let grand = 0, grandPay = 0, grandOtHrs = 0, grandOtPrem = 0;

  Object.keys(byName).sort().forEach(name=>{
    const list = byName[name];
    const rate = rateForNameLocal(name);

    // weekly hours + OT for this person
    const weekHrs = {};
    list.forEach(r=>{
      const h = (r.hours===""||r.hours==null)?0:Number(r.hours);
      weekHrs[r.week] = (weekHrs[r.week]||0) + h;
    });
    const weekOt = {};
    Object.keys(weekHrs).forEach(w=>{ weekOt[w] = Math.max(0, weekHrs[w]-40); });

    html += `<div class="emp-panel"><div class="emp-header">${esc(name)}</div><div class="emp-body">`;

    let sub = 0, subPay = 0, subOtHrs = 0, subOtPrem = 0;

    if(multiWeek){
      // group this person's shifts by week
      const byWeek = {};
      list.forEach(r=>{ (byWeek[r.week]=byWeek[r.week]||[]).push(r); });
      Object.keys(byWeek).sort().forEach(wk=>{
        const wlist = byWeek[wk];
        const wHrs = weekHrs[wk];
        const wOt = weekOt[wk];
        const wOtPrem = Math.round(0.5*rate*wOt*100)/100;
        let wPay = 0;
        html += `<div class="week-head${wOt>0?' ot':''}">Week of ${weekLabel(wk)}${wOt>0?'<span class="ot-badge">OT</span>':''}</div>`;
        wlist.forEach(r=>{
          const pay = (r.pay===""||r.pay==null)?0:Number(r.pay);
          wPay += pay;
          html += shiftCard(r, wOt>0);
        });
        sub += wHrs; subPay += wPay;
        if(wOt>0){ subOtHrs += wOt; subOtPrem += wOtPrem; }
        let wLine = `<div class="totals week-total"><span>${weekLabel(wk)} · ${wHrs.toFixed(2)} hrs</span><span>$${wPay.toFixed(2)}</span></div>`;
        if(wOt>0){
          wLine += `<div class="ot-line" style="margin-bottom:10px">${wOt.toFixed(2)} OT hrs · +$${wOtPrem.toFixed(2)} · <b>$${(wPay+wOtPrem).toFixed(2)} with OT</b></div>`;
        }
        html += wLine;
      });
    } else {
      // single week: flat list
      list.forEach(r=>{
        const pay = (r.pay===""||r.pay==null)?0:Number(r.pay);
        subPay += pay;
        html += shiftCard(r, weekOt[r.week]>0);
      });
      sub = Object.values(weekHrs).reduce((a,b)=>a+b,0);
      Object.keys(weekOt).forEach(w=>{ if(weekOt[w]>0){ subOtHrs += weekOt[w]; subOtPrem += 0.5*rate*weekOt[w]; } });
    }

    subOtPrem = Math.round(subOtPrem*100)/100;
    grand += sub; grandPay += subPay; grandOtHrs += subOtHrs; grandOtPrem += subOtPrem;

    let totalLine = `<div class="totals emp-total"><span>${esc(name)} total</span><span>${sub.toFixed(2)} hrs · $${subPay.toFixed(2)}</span></div>`;
    if(subOtHrs>0){
      totalLine += `<div class="ot-line" style="margin-bottom:8px">${subOtHrs.toFixed(2)} OT hrs · +$${subOtPrem.toFixed(2)} premium · <b>$${(subPay+subOtPrem).toFixed(2)} with OT</b></div>`;
    }
    html += totalLine;
    html += `</div></div>`; // close emp-body, emp-panel
  });

  let grandHtml = `<div class="grand-total"><span>Total</span><span>${grand.toFixed(2)} hrs · $${grandPay.toFixed(2)}</span></div>`;
  if(grandOtPrem>0){
    grandHtml += `<div class="ot-line" style="text-align:right">incl. ${grandOtHrs.toFixed(2)} OT hrs · +$${grandOtPrem.toFixed(2)} · <b>$${(grandPay+grandOtPrem).toFixed(2)} total with OT</b></div>`;
  }
  html += grandHtml;
  box.innerHTML = html;

  box.querySelectorAll(".sc-photo").forEach(img=> img.addEventListener("click", ()=> showPhoto(img.dataset.full)));
  box.querySelectorAll("[data-edit]").forEach(b=> b.addEventListener("click", ()=> openEdit(b.dataset.edit)));
}

/* render a single shift card */
function shiftCard(r, otWeek){
  const hrs = (r.hours===""||r.hours==null)?0:Number(r.hours);
  const pay = (r.pay===""||r.pay==null)?0:Number(r.pay);
  const bo = cleanTime(r.breakOut), bi = cleanTime(r.breakIn);
  const brk = (bo||bi) ? `${bo||"?"}–${bi||"?"}` : "—";
  const pic = r.photo ? `<img class="sc-photo" src="${r.photo}" data-full="${r.photo}">` : `<div class="sc-noimg">—</div>`;
  return `<div class="shift-card${otWeek?' ot-week':''}">
    ${pic}
    <div class="sc-body">
      <div class="sc-date">${esc(r.date)}</div>
      <div class="sc-grid">
        <div><span class="lbl">In</span><span class="val">${esc(cleanTime(r.clockIn)||"—")}</span></div>
        <div><span class="lbl">Out</span><span class="val">${esc(cleanTime(r.clockOut)||"—")}</span></div>
        <div><span class="lbl">Break</span><span class="val">${esc(brk)}</span></div>
        <div><span class="lbl">Hours</span><span class="val">${hrs?hrs.toFixed(2):"—"}</span></div>
        <div><span class="lbl">Pay</span><span class="val">${pay?"$"+pay.toFixed(2):"—"}</span></div>
      </div>

/* "Jun 16–22" style label from a Monday yyyy-mm-dd week key */
function weekLabel(wk){
  const parts = wk.split("-");
  const mon = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2]));
  const sun = new Date(mon); sun.setDate(sun.getDate()+6);
  const mons=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  if(mon.getMonth()===sun.getMonth()){
    return `${mons[mon.getMonth()]} ${mon.getDate()}–${sun.getDate()}`;
  }
  return `${mons[mon.getMonth()]} ${mon.getDate()} – ${mons[sun.getMonth()]} ${sun.getDate()}`;
}

/* convert "11:25 PM" -> "23:25" for the time picker */
function to24(s){
  s = cleanTime(s);
  if(!s) return "";
  const m = s.match(/(\d{1,2}):(\d{2})\s*([AP]M)/i);
  if(!m) return "";
  let hh = parseInt(m[1],10); const mm = m[2]; const ap = m[3].toUpperCase();
  if(ap==="PM" && hh<12) hh+=12;
  if(ap==="AM" && hh===12) hh=0;
  return (hh<10?"0"+hh:hh)+":"+mm;
}
/* convert picker "23:25" -> "11:25 PM" for saving */
function from24(id){
  const s = document.getElementById(id).value.trim();
  if(!s) return "";
  const m = s.match(/(\d{1,2}):(\d{2})/);
  if(!m) return "";
  let hh = parseInt(m[1],10); const mm = m[2];
  const ap = hh>=12 ? "PM":"AM";
  hh = hh%12 || 12;
  return hh+":"+mm+" "+ap;
}

async function loadProblems(){
  const box = document.getElementById("problemsList");
  box.innerHTML = '<div class="center"><span class="spinner"></span></div>';
  try{
    const r = await api({action:"getProblems", pin:adminPin});
    if(!r.ok){ box.innerHTML = '<div class="row-empty">'+esc(r.error||"Error")+'</div>'; return; }
    if(!r.problems.length){ box.innerHTML = '<div class="actions-ok">✓ No issues found. Everything looks clean.</div>'; return; }
    box.innerHTML = "";
    r.problems.forEach(p=>{
      const autofix = p.type==="AUTOFIX";
      const editable = p.editable !== false;   // default true if backend didn't send it
      const variance = p.variance || "";        // 'NO_SHOW' | 'LATE' | ''
      const div = document.createElement("div");
      let cardCls = "prob-card";
      if(variance==="NO_SHOW") cardCls += " v-noshow";
      else if(variance==="LATE") cardCls += " v-late";
      else if(!autofix) cardCls += " attention";
      div.className = cardCls;
      let btns;
      if(autofix){
        btns = `<div class="prob-btns">
             <button class="btn-accept" data-accept="${p.row}">Accept fix</button>
             <button class="btn-deny" data-deny="${p.row}">Deny</button>
           </div>`;
      } else if(editable){
        btns = `<div class="prob-btns">
             <button class="btn-fixit" data-fix="${p.timeRow}">Edit shift</button>
             <button class="btn-deny" data-deny="${p.row}">Dismiss</button>
           </div>`;
      } else {
        btns = `<div class="prob-btns">
             <button class="btn-deny" data-deny="${p.row}">Dismiss</button>
           </div>`;
      }
      let typePill;
      if(variance==="NO_SHOW") typePill = `<span class="prob-type noshow">No-show</span>`;
      else if(variance==="LATE") typePill = `<span class="prob-type late">Late</span>`;
      else typePill = `<span class="prob-type ${autofix?'fix':'att'}">${autofix?'Auto-fixable':'Needs attention'}</span>`;
      div.innerHTML = `
        <div class="prob-top">
          <span class="prob-who">${esc(p.employee||"—")} · ${esc(p.date||"")}</span>
          ${typePill}
        </div>
        <div class="prob-issue">${esc(p.issue)}</div>
        <div class="prob-fix">Suggested: <b>${esc(p.fix||"—")}</b></div>
        ${btns}`;
      box.appendChild(div);
    });
    box.querySelectorAll("[data-accept]").forEach(b=> b.addEventListener("click", ()=> resolveProblem(b.dataset.accept,"APPROVE",b)));
    box.querySelectorAll("[data-deny]").forEach(b=> b.addEventListener("click", ()=> resolveProblem(b.dataset.deny,"DENY",b)));
    box.querySelectorAll("[data-fix]").forEach(b=> b.addEventListener("click", ()=> openEditFromProblem(b.dataset.fix)));
  }catch(e){ box.innerHTML = '<div class="row-empty">Connection error</div>'; }
}

async function resolveProblem(problemRow, decision, btnEl){
  if(btnEl){ btnEl.innerHTML='<span class="spinner"></span>'; btnEl.disabled=true; }
  try{
    const r = await api({action:"resolveProblem", pin:adminPin, problemRow, decision});
    if(r.ok){ toast(r.message,"ok"); loadProblems(); loadHistory(); }
    else { toast(r.error||"Error","err"); if(btnEl){ btnEl.disabled=false; btnEl.textContent = decision==="DENY"?"Deny":"Accept fix"; } }
  }catch(e){ toast("Connection error","err"); if(btnEl){ btnEl.disabled=false; } }
}

/* shorten "6/28/2026 11:30 PM" -> "6/28 11:30 PM" for the compact row */
function shortWhen(w){
  if(!w) return "";
  return String(w).replace(/^(\d+\/\d+)\/\d{4}\s+/, "$1 ");
}

const TITLES = ["Deli","Cashier","Stocker","Meat Dep.","Manager","Owner"];
function openEmp(e){
  const isNew = !e;
  const curTitles = isNew ? [] : String(e.title||"").split(",").map(t=>t.trim()).filter(Boolean);
  const titleChecks = TITLES.map(t=>{
    const on = curTitles.some(c=>c.toLowerCase()===t.toLowerCase());
    return `<label class="title-check"><input type="checkbox" class="eTitleChk" value="${t}" ${on?'checked':''}><span>${t}</span></label>`;
  }).join("");
  const m = document.getElementById("modalBox");
  m.innerHTML = `
    <h3>${isNew?"Add employee":"Edit "+esc(e.name)}</h3>
    <div class="field"><label>Name</label><input type="text" id="eName" value="${isNew?'':esc(e.name)}"></div>
    <div class="field"><label>Phone</label><input type="tel" id="ePhone" value="${isNew?'':esc(fmtPhone(e.phone||''))}" placeholder="(334) 555-1234"></div>
    <div class="field"><label>Job titles</label><div class="title-checks">${titleChecks}</div></div>
    <div class="field"><label>PIN (4 digits)</label><input type="number" id="ePin" value="${isNew?'':esc(e.pin)}"></div>
    <div class="field"><label>Hourly rate</label><input type="number" id="eRate" value="${isNew?'0':e.rate}" step="0.25"></div>
    <div class="switch-row"><label>Active</label><input type="checkbox" id="eActive" ${isNew||e.active?'checked':''} style="width:22px;height:22px"></div>
    <div class="switch-row"><label>Admin access</label><input type="checkbox" id="eAdmin" ${(!isNew&&e.admin)?'checked':''} style="width:22px;height:22px"></div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-primary" id="saveEmp">Save</button>
      <button class="btn btn-dark" id="closeModal">Cancel</button>
    </div>`;
  document.getElementById("overlay").classList.add("show");
  document.getElementById("closeModal").addEventListener("click", closeModal);
  const phoneInput = document.getElementById("ePhone");
  if(phoneInput){ phoneInput.addEventListener("input", ()=>{ phoneInput.value = fmtPhone(phoneInput.value); }); }
  document.getElementById("saveEmp").addEventListener("click", async ()=>{
    const name = val("eName"), newPin = val("ePin"), rate = val("eRate"), phone = fmtPhone(val("ePhone"));
    const title = Array.from(document.querySelectorAll(".eTitleChk:checked")).map(c=>c.value).join(", ");
    if(!name || newPin.length!==4){ toast("Name and a 4-digit PIN required","err"); return; }
    const btn = document.getElementById("saveEmp"); btn.innerHTML='<span class="spinner"></span>Saving…'; btn.disabled=true;
    const payload = {pin:adminPin, name, newPin, rate, phone, title,
      active:document.getElementById("eActive").checked, admin:document.getElementById("eAdmin").checked};
    payload.action = isNew ? "addEmployee" : "updateEmployee";
    if(!isNew) payload.row = e.row;
    const res = await api(payload);
    if(res.ok){ toast(res.message,"ok"); closeModal(); empCacheLoaded=false; loadStaff(); }
    else { toast(res.error||"Error","err"); btn.innerHTML="Save"; btn.disabled=false; }
  });
}

/* ---- utils ---- */
function fmtPhone(s){
  const d = String(s==null?"":s).replace(/\D/g,"");   // digits only
  if(d.length === 10) return "("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6);
  if(d.length === 11 && d[0]==="1") return "("+d.slice(1,4)+") "+d.slice(4,7)+"-"+d.slice(7);
  return String(s||"");   // leave as-is if not a standard 10-digit number
}
function cleanTime(s){
  s = String(s==null?"":s).trim();
  if(!s) return "";
  // already clean like "11:10 PM"
  let m = s.match(/\b(\d{1,2}):(\d{2})\s*([AaPp][Mm])\b/);
  if(m) return m[1]+":"+m[2]+" "+m[3].toUpperCase();
  // 24-hour or full date string -> pull HH:MM and convert
  m = s.match(/(\d{1,2}):(\d{2})/);
  if(!m) return s;
  let hh = parseInt(m[1],10), mm = m[2];
  const ap = hh>=12 ? "PM":"AM";
  hh = hh%12 || 12;
  return hh+":"+mm+" "+ap;
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
let toastTimer;
function toast(msg, kind, sticky){
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show "+(kind||"");
  clearTimeout(toastTimer);
  if(!sticky) toastTimer = setTimeout(()=> t.classList.remove("show"), 2600);
}
function hideToast(){ document.getElementById("toast").classList.remove("show"); }
function showLoading(msg){ document.getElementById("loadText").textContent = msg||"Loading…"; document.getElementById("loadingOverlay").classList.add("show"); }
function hideLoading(){ document.getElementById("loadingOverlay").classList.remove("show"); }
