<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>busyANT Time Clock</title>
<style>
  :root{
    --orange:#F47B20; --black:#1a1a1a; --green:#2e7d32;
    --ink:#1a1a1a; --muted:#6b6b6b; --line:#e6e6e6; --bg:#faf7f3; --card:#ffffff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;touch-action:manipulation;-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; position:relative; overflow-x:hidden;
  }

  /* full-screen watermark (same big size as idle logo) */
  .watermark{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    width:min(80vw,520px); opacity:.05; pointer-events:none; z-index:0;
  }

  /* header logo on every screen */
  .header{ text-align:center; padding:18px 0 6px; position:relative; z-index:2 }
  .header img{ height:120px; width:auto }

  .screen{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center;
           justify-content:center; min-height:calc(100vh - 80px); padding:10px 20px 30px }
  .app{ width:100%; max-width:460px }

  .card{background:var(--card); border:1px solid var(--line); border-radius:20px; padding:26px; box-shadow:0 8px 30px rgba(0,0,0,.06)}
  .clock-now{text-align:center; font-variant-numeric:tabular-nums; font-size:15px; color:var(--muted); margin-bottom:18px; font-weight:600}

  /* ---- IDLE SCREEN ---- */
  #idleScreen{ position:fixed; inset:0; z-index:40; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;
    transition:opacity .5s ease; }
  #idleScreen.fade{ opacity:0; pointer-events:none }
  .idle-logo{ width:min(80vw,520px); animation:float 3.5s ease-in-out infinite }
  @keyframes float{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-16px) } }
  .idle-time{ font-size:44px; font-weight:800; letter-spacing:-1px; margin-top:24px; font-variant-numeric:tabular-nums }
  .idle-date{ font-size:18px; color:var(--muted); font-weight:600; margin-top:2px }
  .idle-hint{ margin-top:30px; font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:2px;
    color:var(--orange); animation:pulse 2s ease-in-out infinite }
  @keyframes pulse{ 0%,100%{ opacity:.4 } 50%{ opacity:1 } }

  /* PIN screen */
  .pin-display{display:flex; justify-content:center; gap:14px; margin:6px 0 22px}
  .pin-dot{width:16px; height:16px; border-radius:50%; border:2px solid var(--line); background:transparent; transition:.15s}
  .pin-dot.filled{background:var(--orange); border-color:var(--orange)}
  .keys{display:grid; grid-template-columns:repeat(3,1fr); gap:12px}
  .key{
    height:68px; border:none; border-radius:16px; background:#f3efe9; color:var(--ink);
    font-size:26px; font-weight:700; cursor:pointer; transition:background .1s; font-variant-numeric:tabular-nums;
    -webkit-appearance:none; appearance:none; touch-action:manipulation; user-select:none; -webkit-user-select:none;
  }
  .key:active{background:#eae4db}
  .key.ghost{background:transparent}
  .key.action{background:var(--black); color:#fff; font-size:18px; font-weight:700}
  .key.action:active{background:#000}

  /* Status screen */
  .greet{text-align:center; margin-bottom:4px; font-size:14px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:1px}
  .who{text-align:center; font-size:28px; font-weight:800; margin:0 0 4px}
  .state-pill{display:block; width:fit-content; margin:0 auto 22px; padding:6px 16px; border-radius:999px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.5px}
  .state-working{background:#e7f3e8; color:var(--green)}
  .state-break{background:#fff3e0; color:var(--orange)}
  .state-out{background:#f0f0f0; color:var(--muted)}
  .week-hours{ text-align:center; margin:-8px 0 20px; font-size:14px; color:var(--muted); font-weight:600 }
  .week-hours b{ color:var(--ink); font-weight:800 }
  .actions{display:flex; flex-direction:column; gap:12px}
  .btn{border:none; border-radius:16px; padding:20px; font-size:19px; font-weight:800; cursor:pointer; transition:.1s; letter-spacing:.3px}
  .btn:active{transform:scale(.98)}
  .btn-in{background:var(--green); color:#fff}
  .btn-out{background:var(--black); color:#fff}
  .btn-break{background:var(--orange); color:#fff}
  .btn-endbreak{background:var(--green); color:#fff}

  /* Done button — clearly secondary, bigger tap target, NOT a colored action */
  .btn-done{ background:transparent; color:var(--muted); font-weight:700; font-size:16px;
    padding:18px; border:2px solid var(--line); border-radius:16px; margin-top:14px; width:100% }
  .btn-done:active{ background:#f0ece6 }

  /* camera */
  video,canvas{display:none}

  /* ---- loading overlay (logo + spinner) ---- */
  #loadingOverlay{ position:fixed; inset:0; z-index:60; background:rgba(250,247,243,.96);
    display:none; flex-direction:column; align-items:center; justify-content:center }
  #loadingOverlay.show{ display:flex }
  #loadingOverlay img{ width:min(60vw,260px); animation:float 3.5s ease-in-out infinite }
  .load-spin{ width:36px; height:36px; border:4px solid rgba(0,0,0,.12); border-top-color:var(--orange);
    border-radius:50%; animation:spin .7s linear infinite; margin-top:30px }
  .load-text{ margin-top:16px; font-weight:700; color:var(--muted); letter-spacing:.5px }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* full-screen green confirmation */
  #confirmScreen{ position:fixed; inset:0; z-index:80; background:var(--green);
    display:none; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
  #confirmScreen.show{ display:flex; }
  .confirm-check{ width:120px; height:120px; }
  .confirm-check svg{ width:100%; height:100%; }
  .confirm-check circle{ stroke:#fff; stroke-width:3;
    stroke-dasharray:151; stroke-dashoffset:151; animation:drawCircle .4s ease forwards; }
  .confirm-check path{ stroke:#fff; stroke-width:4; stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray:40; stroke-dashoffset:40; animation:drawCheck .3s .35s ease forwards; }
  @keyframes drawCircle{ to{ stroke-dashoffset:0 } }
  @keyframes drawCheck{ to{ stroke-dashoffset:0 } }
  .confirm-name{ color:#fff; font-size:38px; font-weight:800; margin-top:26px; letter-spacing:-.5px; text-align:center; }
  .confirm-action{ color:rgba(255,255,255,.92); font-size:20px; font-weight:600; margin-top:6px; text-align:center; }

  /* toast */
  .toast{
    position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(120px);
    background:var(--black); color:#fff; padding:16px 26px; border-radius:14px; font-weight:700; font-size:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.25); transition:transform .3s cubic-bezier(.2,.9,.3,1); max-width:90vw; text-align:center; z-index:70;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.err{background:#c62828}
  .toast.ok{background:var(--green)}

  .ver{text-align:center; margin-top:16px; font-size:11px; color:#bdbdbd}
  .ver a{color:#bdbdbd; text-decoration:underline; cursor:pointer}
  .hidden{display:none}
</style>
</head>
<body>

<!-- big faint watermark behind everything -->
<img class="watermark" src="logo.png" alt="">

<!-- IDLE / ATTRACT SCREEN -->
<div id="idleScreen">
  <img class="idle-logo" src="logo.png" alt="busyANT Super Market">
  <div class="idle-time" id="idleTime">—</div>
  <div class="idle-date" id="idleDate">—</div>
  <div class="idle-hint">Touch to begin</div>
</div>

<!-- header logo -->
<div class="header"><img src="logo.png" alt="busyANT"></div>

<div class="screen">
  <div class="app">
    <div class="card">
      <div class="clock-now" id="liveClock">—</div>

      <!-- PIN screen -->
      <div id="pinScreen">
        <div class="pin-display" id="pinDisplay">
          <div class="pin-dot"></div><div class="pin-dot"></div>
          <div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="keys">
          <button class="key" data-k="1">1</button>
          <button class="key" data-k="2">2</button>
          <button class="key" data-k="3">3</button>
          <button class="key" data-k="4">4</button>
          <button class="key" data-k="5">5</button>
          <button class="key" data-k="6">6</button>
          <button class="key" data-k="7">7</button>
          <button class="key" data-k="8">8</button>
          <button class="key" data-k="9">9</button>
          <button class="key ghost"></button>
          <button class="key" data-k="0">0</button>
          <button class="key action" data-k="del">⌫</button>
        </div>
      </div>

      <!-- Status screen -->
      <div id="statusScreen" class="hidden">
        <div class="greet">Welcome</div>
        <p class="who" id="whoName">—</p>
        <span class="state-pill" id="statePill">—</span>
        <div class="week-hours" id="weekHours"></div>
        <div class="actions" id="actionButtons"></div>
        <button class="btn-done" id="doneBtn">Done</button>
      </div>
    </div>

    <div class="ver">v2.0 · <a id="refreshLink">refresh</a></div>
  </div>
</div>

<video id="cam" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<!-- loading overlay -->
<div id="loadingOverlay">
  <img src="logo.png" alt="">
  <div class="load-spin"></div>
  <div class="load-text" id="loadText">Checking…</div>
</div>

<!-- full-screen green confirmation after a punch -->
<div id="confirmScreen">
  <div class="confirm-check">
    <svg viewBox="0 0 52 52" aria-hidden="true"><circle cx="26" cy="26" r="24" fill="none"/><path fill="none" d="M14 27 l8 8 l16 -18"/></svg>
  </div>
  <div class="confirm-name" id="confirmName">—</div>
  <div class="confirm-action" id="confirmAction">—</div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---- block pinch-zoom on iOS Safari (double-tap handled by CSS touch-action) ---- */
document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
document.addEventListener('gesturechange', function(e){ e.preventDefault(); });
document.addEventListener('gestureend', function(e){ e.preventDefault(); });
document.addEventListener('touchmove', function(e){
  if (e.touches.length > 1) { e.preventDefault(); }
}, { passive: false });

const API = "https://busyant-proxy.pateltirth1211.workers.dev";

let pin = "";
let currentEmp = null;
let camReady = false;
let idleTimer = null;
let confirmTimer = null;
const IDLE_MS = 30000;      // 30s back to idle
const CONFIRM_MS = 1500;    // 1.5s full-screen confirmation then idle

/* ---- live clock (header + idle) ---- */
function tickClock(){
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  m = m < 10 ? "0"+m : m;
  const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const dfull=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const mons=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("liveClock").textContent =
    `${days[d.getDay()]}, ${mons[d.getMonth()]} ${d.getDate()} · ${h}:${m} ${ap}`;
  document.getElementById("idleTime").textContent = `${h}:${m} ${ap}`;
  document.getElementById("idleDate").textContent = `${days[d.getDay()]}, ${dfull[d.getMonth()]} ${d.getDate()}`;
}
setInterval(tickClock, 1000); tickClock();

/* ---- idle screen logic ---- */
const idleEl = document.getElementById("idleScreen");
let reloadTimer = null;
const RELOAD_MS = 180000;   // reload page after 3 min sitting untouched on idle screen

function armReload(){
  clearTimeout(reloadTimer);
  reloadTimer = setTimeout(()=>{
    // only reload if still showing the idle screen (nobody walked up)
    if(!idleEl.classList.contains("fade")){
      location.reload();
    }
  }, RELOAD_MS);
}
function cancelReload(){ clearTimeout(reloadTimer); }

function showIdle(){
  clearTimeout(idleTimer); clearTimeout(confirmTimer);
  document.getElementById("confirmScreen").classList.remove("show");
  goHome();                       // reset to PIN underneath
  idleEl.classList.remove("fade");
  idleEl.style.pointerEvents = "auto";
  armReload();                    // start the quiet-reload countdown
}
function wakeFromIdle(){
  cancelReload();                 // someone's here — don't reload under them
  idleEl.classList.add("fade");
  setTimeout(()=>{ idleEl.style.pointerEvents = "none"; }, 500);
  resetIdleTimer();
}
idleEl.addEventListener("click", wakeFromIdle);

function resetIdleTimer(){
  clearTimeout(idleTimer);
  idleTimer = setTimeout(showIdle, IDLE_MS);
}
/* any interaction on the app resets the idle countdown */
["click","touchstart","keydown"].forEach(ev=>{
  document.addEventListener(ev, ()=>{
    if(!idleEl.classList.contains("fade")) return; // ignore while idle is showing
    resetIdleTimer();
  }, {passive:true});
});

/* ---- camera warmup ---- */
async function initCam(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user", width:480, height:480}});
    document.getElementById("cam").srcObject = stream;
    camReady = true;
  }catch(e){ camReady = false; }
}
initCam();

function snapPhoto(){
  if(!camReady) return "";
  try{
    const v = document.getElementById("cam");
    const c = document.getElementById("canvas");
    const size = 240;
    c.width = size; c.height = size;
    const ctx = c.getContext("2d");
    const vw = v.videoWidth, vh = v.videoHeight;
    const side = Math.min(vw, vh);
    ctx.drawImage(v, (vw-side)/2, (vh-side)/2, side, side, 0, 0, size, size);
    return c.toDataURL("image/jpeg", 0.6);
  }catch(e){ return ""; }
}

/* ---- loading overlay ---- */
function showLoading(msg){
  document.getElementById("loadText").textContent = msg || "Loading…";
  document.getElementById("loadingOverlay").classList.add("show");
}
function hideLoading(){ document.getElementById("loadingOverlay").classList.remove("show"); }

/* ---- PIN entry ---- */
function renderPin(){
  const dots = document.querySelectorAll("#pinDisplay .pin-dot");
  dots.forEach((d,i)=> d.classList.toggle("filled", i < pin.length));
}
document.querySelectorAll(".key[data-k]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const k = btn.dataset.k;
    if(k === "del"){ pin = pin.slice(0,-1); }
    else if(pin.length < 4){ pin += k; }
    renderPin();
    if(pin.length === 4){ checkPin(); }
  });
});

/* ---- API ---- */
async function api(payload){
  const res = await fetch(API, { method:"POST", body: JSON.stringify(payload) });
  const text = await res.text();
  let data = JSON.parse(text);
  if (typeof data === "string") data = JSON.parse(data);
  return data;
}

async function checkPin(){
  showLoading("Checking…");
  try{
    const r = await api({action:"getStatus", pin});
    hideLoading();
    if(!r.ok){ toast(r.error || "PIN not recognized", "err"); resetPin(); return; }
    currentEmp = {name:r.name, state:r.state, admin:r.admin, weekHours:r.weekHours};
    showStatus();
  }catch(e){ hideLoading(); toast("Connection error — try again", "err"); resetPin(); }
}

function resetPin(){ pin=""; renderPin(); }

/* ---- status screen ---- */
function showStatus(){
  document.getElementById("pinScreen").classList.add("hidden");
  document.getElementById("statusScreen").classList.remove("hidden");
  document.getElementById("whoName").textContent = currentEmp.name;
  const wh = document.getElementById("weekHours");
  if(currentEmp.weekHours != null){
    wh.innerHTML = `This week: <b>${Number(currentEmp.weekHours).toFixed(2)} hrs</b>`;
  } else { wh.innerHTML = ""; }

  const pill = document.getElementById("statePill");
  const box  = document.getElementById("actionButtons");
  box.innerHTML = "";

  if(currentEmp.state === "WORKING"){
    pill.textContent = "On the clock"; pill.className = "state-pill state-working";
    box.appendChild(mkBtn("Clock Out", "btn-out", "OUT"));
    box.appendChild(mkBtn("Start Break", "btn-break", "BREAK_OUT"));
  } else if(currentEmp.state === "ON_BREAK"){
    pill.textContent = "On break"; pill.className = "state-pill state-break";
    box.appendChild(mkBtn("End Break", "btn-endbreak", "BREAK_IN"));
  } else {
    pill.textContent = "Clocked out"; pill.className = "state-pill state-out";
    box.appendChild(mkBtn("Clock In", "btn-in", "IN"));
  }
  resetIdleTimer();
}

function mkBtn(label, cls, type){
  const b = document.createElement("button");
  b.className = "btn " + cls;
  b.textContent = label;
  b.addEventListener("click", ()=> doPunch(type, b));
  return b;
}

async function doPunch(type, btnEl){
  document.querySelectorAll("#actionButtons .btn").forEach(b=> b.disabled = true);
  const photo = (type === "IN") ? snapPhoto() : "";
  showLoading("Saving…");
  try{
    const r = await api({action:"punch", pin, type, photo});
    hideLoading();
    if(!r.ok){ toast(r.error || "Could not save", "err");
      document.querySelectorAll("#actionButtons .btn").forEach(b=> b.disabled = false); return; }
    showConfirm(type, r.message);
  }catch(e){
    hideLoading();
    toast("Connection error — try again", "err");
    document.querySelectorAll("#actionButtons .btn").forEach(b=> b.disabled = false);
  }
}

/* full-screen green confirmation, holds CONFIRM_MS then returns to idle */
function showConfirm(type, serverMsg){
  const labels = {
    IN: "Clocked in", OUT: "Clocked out",
    BREAK_OUT: "Break started", BREAK_IN: "Break ended"
  };
  // pull the time out of the server message if present, else just the label
  let action = labels[type] || "Done";
  const m = (serverMsg||"").match(/\d{1,2}:\d{2}\s*[AP]M/i);
  if(m) action += " at " + m[0];
  document.getElementById("confirmName").textContent = (currentEmp && currentEmp.name) ? currentEmp.name : "";
  document.getElementById("confirmAction").textContent = action;
  const cs = document.getElementById("confirmScreen");
  // restart the check animation each time
  cs.classList.remove("show"); void cs.offsetWidth; cs.classList.add("show");
  clearTimeout(confirmTimer);
  confirmTimer = setTimeout(()=>{
    cs.classList.remove("show");
    showIdle();
  }, CONFIRM_MS);
}

function goHome(){
  clearTimeout(confirmTimer);
  currentEmp = null; resetPin();
  document.getElementById("statusScreen").classList.add("hidden");
  document.getElementById("pinScreen").classList.remove("hidden");
}
/* Done button = return to idle immediately */
document.getElementById("doneBtn").addEventListener("click", showIdle);
document.getElementById("refreshLink").addEventListener("click", ()=> location.reload(true));

/* ---- toast ---- */
let toastTimer;
function toast(msg, kind, sticky){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (kind||"");
  clearTimeout(toastTimer);
  // success/confirmation dismisses fast (1s); errors stay up longer so they can be read
  const dur = (kind === "err") ? 3000 : 1000;
  if(!sticky){ toastTimer = setTimeout(()=> t.classList.remove("show"), dur); }
}
function hideToast(){ document.getElementById("toast").classList.remove("show"); }

/* start on idle */
showIdle();
</script>
</body>
</html>
